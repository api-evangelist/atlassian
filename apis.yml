  - type: Features
    data:
      - Jira (Software, Work Mgmt, Service Mgmt) per-user pricing
      - Confluence per-user pricing
      - Bitbucket Cloud per-user pricing
      - Trello free + paid tiers
      - Jira Product Discovery, Jira Align (separate)
      - 'Most products: Free up to 10 users (5 for Bitbucket)'
      - 'Standard tiers: Jira ~$9, Confluence ~$6, Bitbucket $3.65, JSM ~$23 per user/mo'
      - Premium adds Atlassian Intelligence, advanced features, 99.9% SLA
      - 'Enterprise: 99.95% uptime, data residency, centralized security'
      - REST API at api.atlassian.com (per-product paths)
      - GraphQL API (for some products)
      - Per-app per-user rate limit ~10 req/sec
      - OAuth 2.0 (3LO), API tokens, OAuth client credentials
      - Atlassian Connect framework for marketplace apps
      - Forge for serverless app dev
      - Atlassian Marketplace ecosystem
    sources:
      - https://www.atlassian.com/pricing
    updated: '2026-05-04'
  - type: UseCases
    data:
      - name: Agile Software Development
        description: Plan, track, and release software using Scrum and Kanban workflows with Jira Software
          boards and sprints.
      - name: DevOps and CI/CD
        description: Automate build, test, and deployment pipelines using Bitbucket Pipelines integrated
          with Jira for end-to-end traceability.
      - name: IT Service Management
        description: Manage IT service requests, incidents, problems, and changes using Jira Service Management
          with SLA tracking.
      - name: Knowledge Management
        description: Create and organize team documentation, runbooks, and knowledge bases using Confluence
          spaces and templates.
      - name: Enterprise Administration
        description: Manage organization-wide user provisioning, access policies, and product licenses
          across Atlassian Cloud products.
      - name: Incident Management
        description: Detect, respond to, and resolve major incidents with JSM operations alerts, on-call
          schedules, and postmortem tracking.
  - type: Integrations
    data:
      - name: Slack
        description: Real-time notifications and two-way integration between Atlassian products and Slack
          channels for team communication.
      - name: Microsoft Teams
        description: Integration with Microsoft Teams for Jira and Confluence notifications, issue creation,
          and collaboration.
      - name: GitHub
        description: Connect GitHub repositories to Jira for linking commits, branches, and pull requests
          to Jira issues.
      - name: GitLab
        description: Integration with GitLab for development information visibility within Jira issues.
      - name: VS Code
        description: Official Atlassian VS Code extension for Jira issue management and Bitbucket code
          reviews from the IDE.
      - name: Jenkins
        description: Connect Jenkins CI/CD pipelines to Jira for build and deployment visibility on issues.
      - name: Terraform
        description: Terraform provider for managing Atlassian Operations resources as infrastructure-as-code.
      - name: Opsgenie
        description: Incident management and on-call alerting integration now part of Jira Service Management
          Operations.
      - name: Kubernetes
        description: Data Center Helm charts for deploying Atlassian products on Kubernetes clusters.
      - name: Backstage
        description: Integration with Backstage developer portal for service catalog and component tracking.
