specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Atlassian
providerId: atlassian
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - DevOps
  - Project Management
  - Collaboration
description: Atlassian product portfolio pricing. Each product (Jira, Confluence, Bitbucket, Jira Service
  Management, etc.) has its own per-user-per-month tiers.
sources:
  - https://www.atlassian.com/pricing
plans:
  - id: atlassian-free
    name: Free (per product)
    type: freemium
    description: Most products offer Free tier up to 10 users.
    entries:
      - label: Users
        name: users
        type: quota
        metric: user
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 'Jira: 10 users'
      - name: 'Confluence: 10 users'
      - name: 'Bitbucket: 5 users'
      - name: 'JSM: 3 agents'
      - name: 'Trello: 10 boards/workspace'
  - id: atlassian-standard
    name: Standard (per product)
    type: paid
    description: Per-user/per-month tiered pricing.
    entries:
      - label: Jira Standard (avg)
        name: seat
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '9.05'
        userMultiplied: true
      - label: Confluence Standard (avg)
        name: seat
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '6.05'
        userMultiplied: true
