        name: seat
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '3.65'
        userMultiplied: true
      - label: Jira Service Management Standard (avg)
        name: seat
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '23.10'
        userMultiplied: true
    elements:
      - name: Per-product subscriptions
      - name: Volume discounts above 100 users
  - id: atlassian-premium
    name: Premium (per product)
    type: paid
    description: Per-product Premium pricing.
