        scopes:
        - read:repository:bitbucket
      operationId: atlassianListOpenBranches
    post:
      tags:
      - Refs
      description: 'Creates a new branch in the specified repository.<br><br>The payload of the POST should consist of a JSON document that<br>contains the name of the tag and the target hash.<br><br>```<br>curl https://api.bitbucket.org/2.0/repositories/seanfarley/hg/refs/branches \<br>-s -u seanfarley -X POST -H "Content-Type: application/json" \<br>-d ''{<br>    "name" : "smf/create-feature",<br>    "target" : {<br>        "hash" : "default",<br>    }<br>}''<br>```<br><br>This call requires authentication. Private repositories require the<br>caller to authenticate with an account that has appropriate<br>authorization.<br><br>The branch name should not include any prefixes (e.g.<br>refs/heads). This endpoint does support using short hash prefixes for<br>the commit hash, but it may return a 400 response if the provided<br>prefix is ambiguous. Using a full commit hash is the preferred<br>approach.'
      summary: Atlassian Create A Branch
      responses:
        '201':
          description: The newly created branch object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/branch'
        '403':
          description: 'If the repository is private and the authenticated user does not have

            access to it.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository or branch does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - repository:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - write:repository:bitbucket
        - read:repository:bitbucket
      operationId: atlassianCreateABranch
