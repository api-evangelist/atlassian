        type: string
    delete:
      tags:
      - Refs
      description: Delete a tag in the specified repository.<br><br>The tag name should not include any prefixes (e.g. refs/tags).
      summary: Atlassian Delete A Tag
      responses:
        '204':
          description: Indicates the specified tag was successfully deleted.
        '403':
          description: 'If the repository is private and the authenticated user does not have

            access to it.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository or tag does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - repository:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - write:repository:bitbucket
      operationId: atlassianDeleteATag
    get:
      tags:
      - Refs
      description: 'Returns the specified tag.<br><br>```<br>$ curl -s https://api.bitbucket.org/2.0/repositories/seanfarley/hg/refs/tags/3.8 -G | jq .<br>{<br>  "name": "3.8",<br>  "links": {<br>    "commits": {<br>      "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/commits/3.8"<br>    },<br>    "self": {<br>      "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/refs/tags/3.8"<br>    },<br>    "html": {<br>      "href": "https://bitbucket.org/seanfarley/hg/commits/tag/3.8"<br>    }<br>  },<br>  "tagger": {<br>    "raw": "Matt Mackall ",<br>    "type": "author",<br>    "user": {<br>      "username": "mpmselenic",<br>      "nickname": "mpmselenic",<br>      "display_name": "Matt Mackall",<br>      "type": "user",<br>      "uuid": "{a4934530-db4c-419c-a478-9ab4964c2ee7}",<br>      "links": {<br>        "self": {<br>          "href": "https://api.bitbucket.org/2.0/users/mpmselenic"<br>        },<br>        "html": {<br>          "href": "https://bitbucket.org/mpmselenic/"<br>        },<br>        "avatar": {<br>          "href": "https://bitbucket.org/account/mpmselenic/avatar/32/"<br>        }<br>      }<br>    }<br>  },<br>  "date": "2016-05-01T18:52:25+00:00",<br>  "message": "Added tag 3.8 for changeset f85de28eae32",<br>  "type": "tag",<br>  "target": {<br>    "hash": "f85de28eae32e7d3064b1a1321309071bbaaa069",<br>    "repository": {<br>      "links": {<br>        "self": {<br>          "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg"<br>        },<br>        "html": {<br>          "href": "https://bitbucket.org/seanfarley/hg"<br>        },<br>        "avatar": {<br>          "href": "https://bitbucket.org/seanfarley/hg/avatar/32/"<br>        }<br>      },<br>      "type": "repository",<br>      "name": "hg",<br>      "full_name": "seanfarley/hg",<br>      "uuid": "{c75687fb-e99d-4579-9087-190dbd406d30}"<br>    },<br>    "links": {<br>      "self": {<br>        "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/commit/f85de28eae32e7d3064b1a1321309071bbaaa069"<br>      },<br>      "comments": {<br>        "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/commit/f85de28eae32e7d3064b1a1321309071bbaaa069/comments"<br>      },<br>      "patch": {<br>        "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/patch/f85de28eae32e7d3064b1a1321309071bbaaa069"<br>      },<br>      "html": {<br>        "href": "https://bitbucket.org/seanfarley/hg/commits/f85de28eae32e7d3064b1a1321309071bbaaa069"<br>      },<br>      "diff": {<br>        "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/diff/f85de28eae32e7d3064b1a1321309071bbaaa069"<br>      },<br>      "approve": {<br>        "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/commit/f85de28eae32e7d3064b1a1321309071bbaaa069/approve"<br>      },<br>      "statuses": {<br>        "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/commit/f85de28eae32e7d3064b1a1321309071bbaaa069/statuses"<br>      }<br>    },<br>    "author": {<br>      "raw": "Sean Farley ",<br>      "type": "author",<br>      "user": {<br>        "username": "seanfarley",<br>        "nickname": "seanfarley",<br>        "display_name": "Sean Farley",<br>        "type": "user",<br>        "uuid": "{a295f8a8-5876-4d43-89b5-3ad8c6c3c51d}",<br>        "links": {<br>          "self": {<br>            "href": "https://api.bitbucket.org/2.0/users/seanfarley"<br>          },<br>          "html": {<br>            "href": "https://bitbucket.org/seanfarley/"<br>          },<br>          "avatar": {<br>            "href": "https://bitbucket.org/account/seanfarley/avatar/32/"<br>          }<br>        }<br>      }<br>    },<br>    "parents": [<br>      {<br>        "hash": "9a98d0e5b07fc60887f9d3d34d9ac7d536f470d2",<br>        "type": "commit",<br>        "links": {<br>          "self": {<br>            "href": "https://api.bitbucket.org/2.0/repositories/seanfarley/hg/commit/9a98d0e5b07fc60887f9d3d34d9ac7d536f470d2"<br>          },<br>          "html": {<br>            "href": "https://bitbucket.org/seanfarley/hg/commits/9a98d0e5b07fc60887f9d3d34d9ac7d536f470d2"<br>          }<br>        }<br>      }<br>    ],<br>    "date": "2016-05-01T04:21:17+00:00",<br>    "message": "debian: alphabetize build deps",<br>    "type": "commit"<br>  }<br>}<br>```'
      summary: Atlassian Get A Tag
      responses:
        '200':
          description: The tag object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tag'
        '403':
          description: 'If the repository is private and the authenticated user does not have

            access to it.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
