    delete:
      tags:
      - Refs
      description: Delete a branch in the specified repository.<br><br>The main branch is not allowed to be deleted and will return a 400<br>response.<br><br>The branch name should not include any prefixes (e.g.<br>refs/heads).
      summary: Atlassian Delete A Branch
      responses:
        '204':
          description: Indicates that the specified branch was successfully deleted.
        '403':
          description: 'If the repository is private and the authenticated user does not have

            access to it.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository or branch does not exist.
          content:
