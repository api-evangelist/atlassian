      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - write:repository:bitbucket
      operationId: atlassianDeleteABranch
    get:
      tags:
      - Refs
      description: Returns a branch object within the specified repository.<br><br>This call requires authentication. Private repositories require the<br>caller to authenticate with an account that has appropriate<br>authorization.<br><br>For Git, the branch name should not include any prefixes (e.g.<br>refs/heads).
