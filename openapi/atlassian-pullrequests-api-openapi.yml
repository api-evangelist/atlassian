      operationId: atlassianMergeAPullRequest
  /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/merge/task-status/{task_id}:
    parameters:
    - name: pull_request_id
      in: path
      description: The id of the pull request.
      required: true
      schema:
        type: integer
    - name: repo_slug
      in: path
      description: 'This can either be the repository slug or the UUID of the repository,

        surrounded by curly-braces, for example: `{repository UUID}`.

        '
      required: true
      schema:
        type: string
    - name: task_id
      in: path
      description: ID of the merge task
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
    get:
      tags:
      - Pullrequests
      description: 'When merging a pull request takes too long, the client receives a<br>task ID along with a 202 status code. The task ID can be used in a call<br>to this endpoint to check the status of a merge task.<br><br>```<br>curl -X GET https://api.bitbucket.org/2.0/repositories/atlassian/bitbucket/pullrequests/2286/merge/task-status/<br>```<br><br>If the merge task is not yet finished, a PENDING status will be returned.<br><br>```<br>HTTP/2 200<br>{<br>    "task_status": "PENDING",<br>    "links": {<br>        "self": {<br>            "href": "https://api.bitbucket.org/2.0/repositories/atlassian/bitbucket/pullrequests/2286/merge/task-status/"<br>        }<br>    }<br>}<br>```<br><br>If the merge was successful, a SUCCESS status will be returned.<br><br>```<br>HTTP/2 200<br>{<br>    "task_status": "SUCCESS",<br>    "links": {<br>        "self": {<br>            "href": "https://api.bitbucket.org/2.0/repositories/atlassian/bitbucket/pullrequests/2286/merge/task-status/"<br>        }<br>    },<br>    "merge_result": <br>}<br>```<br><br>If the merge task failed, an error will be returned.<br><br>```<br>{<br>    "type": "error",<br>    "error": {<br>        "message": ""<br>    }<br>}<br>```'
      summary: Atlassian Get The Merge Task Status For A Pull Request
      responses:
        '200':
          description: Returns a task status if the merge is either pending or successful, and if it is successful, a pull request
        '400':
          description: If the provided task ID does not relate to this pull request, or if something went wrong during the merge operation
        '403':
          description: The user making the request does not have permission to the repo and is different from the user who queued the task
      security:
      - oauth2:
        - pullrequest
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pullrequest:bitbucket
      operationId: atlassianGetTheMergeTaskStatusForAPullRequest
