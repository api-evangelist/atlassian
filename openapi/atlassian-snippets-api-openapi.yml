  /snippets:
    parameters: []
    get:
      tags:
      - Snippets
      description: 'Returns all snippets. Like pull requests, repositories and workspaces, the<br>full set of snippets is defined by what the current user has access to.<br><br>This includes all snippets owned by any of the workspaces the user is a member of,<br>or snippets by other users that the current user is either watching or has collaborated<br>on (for instance by commenting on it).<br><br>To limit the set of returned snippets, apply the<br>`?role=[owner|contributor|member]` query parameter where the roles are<br>defined as follows:<br><br>* `owner`: all snippets owned by the current user<br>* `contributor`: all snippets owned by, or watched by the current user<br>* `member`: created in a workspaces or watched by the current user<br><br>When no role is specified, all public snippets are returned, as well as all<br>privately owned snippets watched or commented on.<br><br>The returned response is a normal paginated JSON list. This endpoint<br>only supports `application/json` responses and no<br>`multipart/form-data` or `multipart/related`. As a result, it is not<br>possible to include the file contents.'
      summary: Atlassian List Snippets
      responses:
        '200':
          description: A paginated list of snippets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_snippets_3'
        '404':
          description: If the snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_2'
      parameters:
      - name: role
        in: query
        description: Filter down the result based on the authenticated user's role (`owner`, `contributor`, or `member`).
        required: false
        schema:
          type: string
          enum:
          - owner
          - contributor
          - member
      security:
      - oauth2:
        - snippet
      - basic: []
      - api_key: []
      operationId: atlassianListSnippets
    post:
      tags:
      - Snippets
      description: 'Creates a new snippet under the authenticated user''s account.<br><br>Snippets can contain multiple files. Both text and binary files are<br>supported.<br><br>The simplest way to create a new snippet from a local file:<br><br>    $ curl -u username:password -X POST https://api.bitbucket.org/2.0/snippets               -F file=@image.png<br><br>Creating snippets through curl has a few limitations and so let''s look<br>at a more complicated scenario.<br><br>Snippets are created with a multipart POST. Both `multipart/form-data`<br>and `multipart/related` are supported. Both allow the creation of<br>snippets with both meta data (title, etc), as well as multiple text<br>and binary files.<br><br>The main difference is that `multipart/related` can use rich encoding<br>for the meta data (currently JSON).<br><br><br>multipart/related (RFC-2387)<br>-<br><br>This is the most advanced and efficient way to create a paste.<br><br>    POST /2.0/snippets/evzijst HTTP/1.1<br>    Content-Length: 1188<br>    Content-Type: multipart/related; start="snippet"; boundary="===============1438169132528273974=="<br>    MIME-Version: 1.0<br><br>    --===============1438169132528273974==<br>    Content-Type: application/json; charset="utf-8"<br>    MIME-Version: 1.0<br>    Content-ID: snippet<br><br>    {<br>      "title": "My snippet",<br>      "is_private": true,<br>      "scm": "git",<br>      "files": {<br>          "foo.txt": {},<br>          "image.png": {}<br>        }<br>    }<br><br>    --===============1438169132528273974==<br>    Content-Type: text/plain; charset="us-ascii"<br>    MIME-Version: 1.0<br>    Content-Transfer-Encoding: 7bit<br>    Content-ID: "foo.txt"<br>    Content-Disposition: attachment; filename="foo.txt"<br><br>    foo<br><br>    --===============1438169132528273974==<br>    Content-Type: image/png<br>    MIME-Version: 1.0<br>    Content-Transfer-Encoding: base64<br>    Content-ID: "image.png"<br>    Content-Disposition: attachment; filename="image.png"<br><br>    iVBORw0KGgoAAAANSUhEUgAAABQAAAAoCAYAAAD+MdrbAAABD0lEQVR4Ae3VMUoDQRTG8ccUaW2m<br>    TKONFxArJYJamCvkCnZTaa+VnQdJSBFl2SMsLFrEWNjZBZs0JgiL/+KrhhVmJRbCLPx4O+/DT2TB<br>    cbblJxf+UWFVVRNsEGAtgvJxnLm2H+A5RQ93uIl+3632PZyl/skjfOn9Gvdwmlcw5aPUwimG+NT5<br>    EnNN036IaZePUuIcK533NVfal7/5yjWeot2z9ta1cAczHEf7I+3J0ws9Cgx0fsOFpmlfwKcWPuBQ<br>    73Oc4FHzBaZ8llq4q1mr5B2mOUCt815qYR8eB1hG2VJ7j35q4RofaH7IG+Xrf/PfJhfmwtfFYoIN<br>    AqxFUD6OMxcvkO+UfKfkOyXfKdsv/AYCHMLVkHAFWgAAAABJRU5ErkJggg==<br>    --===============1438169132528273974==--<br><br>The request contains multiple parts and is structured as follows.<br><br>The first part is the JSON document that describes the snippet''s<br>properties or meta data. It either has to be the first part, or the<br>request''s `Content-Type` header must contain the `start` parameter to<br>point to it.<br><br>The remaining parts are the files of which there can be zero or more.<br>Each file part should contain the `Content-ID` MIME header through<br>which the JSON meta data''s `files` element addresses it. The value<br>should be the name of the file.<br><br>`Content-Disposition` is an optional MIME header. The header''s<br>optional `filename` parameter can be used to specify the file name<br>that Bitbucket should use when writing the file to disk. When present,<br>`filename` takes precedence over the value of `Content-ID`.<br><br>When the JSON body omits the `files` element, the remaining parts are<br>not ignored. Instead, each file is added to the new snippet as if its<br>name was explicitly linked (the use of the `files` elements is<br>mandatory for some operations like deleting or renaming files).<br><br><br>multipart/form-data<br>-<br><br>The use of JSON for the snippet''s meta data is optional. Meta data can<br>also be supplied as regular form fields in a more conventional<br>`multipart/form-data` request:<br><br>    $ curl -X POST -u credentials https://api.bitbucket.org/2.0/snippets               -F title="My snippet"               -F file=@foo.txt -F file=@image.png<br><br>    POST /2.0/snippets HTTP/1.1<br>    Content-Length: 951<br>    Content-Type: multipart/form-data; boundary=-63a4b224c59f<br><br>    63a4b224c59f<br>    Content-Disposition: form-data; name="file"; filename="foo.txt"<br>    Content-Type: text/plain<br><br>    foo<br><br>    63a4b224c59f<br>    Content-Disposition: form-data; name="file"; filename="image.png"<br>    Content-Type: application/octet-stream<br><br>    ?PNG<br><br>    IHDR?1??I.....<br>    63a4b224c59f<br>    Content-Disposition: form-data; name="title"<br><br>    My snippet<br>    63a4b224c59f--<br><br>Here the meta data properties are included as flat, top-level form<br>fields. The file attachments use the `file` field name. To attach<br>multiple files, simply repeat the field.<br><br>The advantage of `multipart/form-data` over `multipart/related` is<br>that it can be easier to build clients.<br><br>Essentially all properties are optional, `title` and `files` included.<br><br><br>Sharing and Visibility<br>-<br><br>Snippets can be either public (visible to anyone on Bitbucket, as well<br>as anonymous users), or private (visible only to members of the workspace).<br>This is controlled through the snippet''s `is_private` element:<br><br>* **is_private=false** -- everyone, including anonymous users can view<br>  the snippet<br>* **is_private=true** -- only workspace members can view the snippet<br><br>To create the snippet under a workspace, just append the workspace ID<br>to the URL. See [`/2.0/snippets/{workspace}`](/cloud/bitbucket/rest/api-group-snippets/#api-snippets-workspace-post).'
      summary: Atlassian Create A Snippet
      responses:
        '201':
          description: The newly created snippet object.
          headers:
            Location:
              description: The URL of the newly created snippet.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/snippet'
        '401':
          description: If the request was not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_2'
      requestBody:
        $ref: '#/components/requestBodies/snippet'
      security:
      - oauth2:
        - snippet:write
      - basic: []
      - api_key: []
      operationId: atlassianCreateASnippet
