      - basic: []
      - api_key: []
      operationId: atlassianListChangesOnAnIssue
    post:
      tags:
      - Issue Tracker
      description: 'Makes a change to the specified issue.<br><br>For example, to change an issue''s state and assignee, create a new<br>change object that modifies these fields:<br><br>```<br>curl https://api.bitbucket.org/2.0/site/master/issues/1234/changes \<br>  -s -u evzijst -X POST -H "Content-Type: application/json" \<br>  -d ''{<br>    "changes": {<br>      "assignee_account_id": {<br>        "new": "557058:c0b72ad0-1cb5-4018-9cdc-0cde8492c443"<br>      },<br>      "state": {<br>        "new": ''resolved"<br>      }<br>    }<br>    "message": {<br>      "raw": "This is now resolved."<br>    }<br>  }''<br>```<br><br>The above example also includes a custom comment to go alongside the<br>change. This comment will also be visible on the issue page in the UI.<br><br>The fields of the `changes` object are strings, not objects. This<br>allows for immutable change log records, even after user accounts,<br>milestones, or other objects recorded in a change entry, get renamed or<br>deleted.<br><br>The `assignee_account_id` field stores the account id. When POSTing a<br>new change and changing the assignee, the client should therefore use<br>the user''s account_id in the `changes.assignee_account_id.new` field.<br><br>This call requires authentication. Private repositories or private<br>issue trackers require the caller to authenticate with an account that<br>has appropriate authorization.'
      summary: Atlassian Modify The State Of An Issue
      responses:
