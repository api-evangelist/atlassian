openapi: 3.1.0
info:
  title: Atlassian Admin Account Project Types API
  description: The Atlassian Admin API provides programmatic access to manage Atlassian organizations, users, domains, policies, and events. It enables administrators to automate organization management tasks, integrate with identity providers, and ensure appropriate access to Atlassian products.
  version: 1.0.0
  contact:
    name: Atlassian Developer
    url: https://developer.atlassian.com/cloud/admin/
  license:
    name: Atlassian Developer Terms
    url: https://developer.atlassian.com/platform/marketplace/atlassian-developer-terms/
  x-logo:
    url: https://wac-cdn.atlassian.com/assets/img/favicons/atlassian/favicon.png
servers:
- url: https://api.atlassian.com
  description: Atlassian Cloud API
security:
- bearerAuth: []
- oauth2: []
tags:
- name: Project Types
paths:
  /rest/api/3/project/type:
    get:
      deprecated: false
      description: Returns all [project types](https://confluence.atlassian.com/x/Var1Nw), whether or not the instance has a valid license for each type.<br><br>This operation can be accessed anonymously.<br><br>**[Permissions](#permissions) required:** None.
      operationId: atlassianGetallprojecttypes
      parameters: []
      responses:
        '200':
          content:
            application/json:
              example: '[{"color":"#FFFFFF","descriptionI18nKey":"jira.project.type.business.description","formattedKey":"Business","icon":"","key":"business"},{"color":"#AAAAAA","descriptionI18nKey":"jira.project.type.software.description","formattedKey":"Software","icon":"","key":"software"}]'
              schema:
                items:
                  $ref: '#/components/schemas/ProjectType'
                type: array
          description: Returned if the request is successful.
        '401':
          description: Returned if the authentication credentials are incorrect.
      security:
      - basicAuth: []
      - OAuth2:
        - read:jira-work
      - {}
      summary: Atlassian Get All Project Types
      tags:
      - Project Types
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: true
      x-atlassian-oauth2-scopes:
      - scheme: OAuth2
        scopes:
        - read:jira-work
        state: Current
      - scheme: OAuth2
        scopes:
        - read:project-type:jira
        state: Beta
      x-atlassian-connect-scope: READ
  /rest/api/3/project/type/accessible:
    get:
      deprecated: false
      description: Returns all [project types](https://confluence.atlassian.com/x/Var1Nw) with a valid license.
      operationId: atlassianGetallaccessibleprojecttypes
      parameters: []
      responses:
        '200':
          content:
            application/json:
              example: '[{"color":"#FFFFFF","descriptionI18nKey":"jira.project.type.business.description","formattedKey":"Business","icon":"","key":"business"},{"color":"#AAAAAA","descriptionI18nKey":"jira.project.type.software.description","formattedKey":"Software","icon":"","key":"software"}]'
              schema:
                items:
                  $ref: '#/components/schemas/ProjectType'
                type: array
          description: Returned if the request is successful.
      security:
      - basicAuth: []
      - OAuth2:
        - read:jira-work
      - {}
      summary: Atlassian Get Licensed Project Types
      tags:
      - Project Types
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: true
      x-atlassian-oauth2-scopes:
      - scheme: OAuth2
        scopes:
        - read:jira-work
        state: Current
      - scheme: OAuth2
        scopes:
        - read:project-type:jira
        state: Beta
      x-atlassian-connect-scope: READ
  /rest/api/3/project/type/{projectTypeKey}:
    get:
      deprecated: false
      description: Returns a [project type](https://confluence.atlassian.com/x/Var1Nw).<br><br>This operation can be accessed anonymously.<br><br>**[Permissions](#permissions) required:** None.
      operationId: atlassianGetprojecttypebykey
      parameters:
      - description: The key of the project type.
        in: path
        name: projectTypeKey
        required: true
        schema:
          enum:
          - software
          - service_desk
          - business
          - product_discovery
          type: string
      responses:
        '200':
          content:
            application/json:
              example: '{"color":"#FFFFFF","descriptionI18nKey":"jira.project.type.business.description","formattedKey":"Business","icon":"","key":"business"}'
              schema:
                $ref: '#/components/schemas/ProjectType'
          description: Returned if the request is successful.
        '401':
          description: Returned if the authentication credentials are incorrect.
        '404':
          description: Returned if the project type is not found.
      security:
      - basicAuth: []
      - OAuth2:
        - read:jira-work
      - {}
      summary: Atlassian Get Project Type By Key
      tags:
      - Project Types
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: true
      x-atlassian-oauth2-scopes:
      - scheme: OAuth2
        scopes:
        - read:jira-work
        state: Current
      - scheme: OAuth2
        scopes:
        - read:project-type:jira
        state: Beta
      x-atlassian-connect-scope: READ
  /rest/api/3/project/type/{projectTypeKey}/accessible:
    get:
      deprecated: false
      description: Returns a [project type](https://confluence.atlassian.com/x/Var1Nw) if it is accessible to the user.<br><br>**[Permissions](#permissions) required:** Permission to access Jira.
      operationId: atlassianGetaccessibleprojecttypebykey
      parameters:
      - description: The key of the project type.
        in: path
        name: projectTypeKey
        required: true
        schema:
          enum:
          - software
          - service_desk
          - business
          - product_discovery
          type: string
      responses:
        '200':
          content:
            application/json:
              example: '{"color":"#FFFFFF","descriptionI18nKey":"jira.project.type.business.description","formattedKey":"Business","icon":"","key":"business"}'
              schema:
                $ref: '#/components/schemas/ProjectType'
          description: Returned if the request is successful.
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
        '404':
          description: Returned if the project type is not accessible to the user.
      security:
      - basicAuth: []
      - OAuth2:
        - read:jira-work
      - {}
      summary: Atlassian Get Accessible Project Type By Key
      tags:
      - Project Types
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: true
      x-atlassian-oauth2-scopes:
      - scheme: OAuth2
        scopes:
        - read:jira-work
        state: Current
      - scheme: OAuth2
        scopes:
        - read:project-type:jira
        state: Beta
      x-atlassian-connect-scope: READ
components:
  schemas:
    ProjectType:
      additionalProperties: false
      description: Details about a project type.
      properties:
        color:
          description: The color of the project type.
          readOnly: true
          type: string
        descriptionI18nKey:
          description: The key of the project type's description.
          readOnly: true
          type: string
        formattedKey:
          description: The formatted key of the project type.
          readOnly: true
          type: string
        icon:
          description: The icon of the project type.
          readOnly: true
          type: string
        key:
          description: The key of the project type.
          readOnly: true
          type: string
      type: object
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: Use an Atlassian API key as a Bearer token. Create API keys at https://admin.atlassian.com.
    oauth2:
      type: oauth2
      description: OAuth 2.0 authorization for Atlassian Cloud APIs.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.atlassian.com/authorize
          tokenUrl: https://auth.atlassian.com/oauth/token
          scopes:
            read:org:admin: Read organization information.
            write:org:admin: Modify organization settings.
            read:user:admin: Read user information.
            write:user:admin: Modify user accounts.
            read:policy:admin: Read organization policies.
            write:policy:admin: Modify organization policies.
            read:event:admin: Read organization events.
externalDocs:
  description: Atlassian Admin REST API Documentation
  url: https://developer.atlassian.com/cloud/admin/organization/rest/intro/
