openapi: 3.1.0
info:
  title: Atlassian Admin Account Content Watches API
  description: The Atlassian Admin API provides programmatic access to manage Atlassian organizations, users, domains, policies, and events. It enables administrators to automate organization management tasks, integrate with identity providers, and ensure appropriate access to Atlassian products.
  version: 1.0.0
  contact:
    name: Atlassian Developer
    url: https://developer.atlassian.com/cloud/admin/
  license:
    name: Atlassian Developer Terms
    url: https://developer.atlassian.com/platform/marketplace/atlassian-developer-terms/
  x-logo:
    url: https://wac-cdn.atlassian.com/assets/img/favicons/atlassian/favicon.png
servers:
- url: https://api.atlassian.com
  description: Atlassian Cloud API
security:
- bearerAuth: []
- oauth2: []
tags:
- name: Content Watches
paths:
  /wiki/rest/api/space/{spaceKey}/watch:
    get:
      tags:
      - Content Watches
      summary: Atlassian Get Space Watchers
      description: Returns a list of watchers of a space
      operationId: atlassianGetwatchersforspace
      parameters:
      - name: spaceKey
        in: path
        description: The key of the space to get watchers.
        required: true
        schema:
          type: string
      - name: start
        in: query
        description: The start point of the collection to return.
        schema:
          type: string
      - name: limit
        in: query
        description: The limit of the number of items to return, this may be restricted by fixed system limits.
        schema:
          type: string
      responses:
        '200':
          description: Returned if watchers list is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpaceWatchArray'
        '404':
          description: Returned if there is no space with the given key
          content: {}
      security:
      - basicAuth: []
      - oAuthDefinitions:
        - read:watcher:confluence
        - read:user:confluence
      x-atlassian-oauth2-scopes:
      - scheme: oAuthDefinitions
        state: Current
        scopes:
        - read:watcher:confluence
        - read:user:confluence
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: true
      x-atlassian-connect-scope: READ
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /wiki/rest/api/user/watch/content/{contentId}:
    get:
      tags:
      - Content Watches
      summary: Atlassian Get Content Watch Status
      description: 'Returns whether a user is watching a piece of content. Choose the user by<br>doing one of the following:<br><br>- Specify a user via a query parameter: Use the `accountId` to identify the user.<br>- Do not specify a user: The currently logged-in user will be used.<br><br>**[Permissions](https://confluence.atlassian.com/x/_AozKw) required**:<br>''Confluence Administrator'' global permission if specifying a user, otherwise<br>permission to access the Confluence site (''Can use'' global permission).'
      operationId: atlassianGetcontentwatchstatus
      parameters:
      - name: contentId
        in: path
        description: 'The ID of the content to be queried for whether the specified user is

          watching it.'
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/userLookupKey'
      - $ref: '#/components/parameters/userLookupUsername'
      - $ref: '#/components/parameters/userLookupAccountId'
      responses:
        '200':
          description: Returned if the requested watch status is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWatch'
        '403':
          description: 'Returned if;


            - The calling user does not have permission to view the

            content.

            - A user is specified via a query parameter and the calling user is

            not a Confluence administrator.

            - No content exists for the specified `contentId`.'
          content: {}
        '404':
          description: Returned if no `contentId` is specified.
          content: {}
      security:
      - basicAuth: []
      - oAuthDefinitions:
        - read:confluence-content.summary
      x-atlassian-oauth2-scopes:
      - scheme: oAuthDefinitions
        state: Current
        scopes:
        - read:confluence-content.summary
      - scheme: oAuthDefinitions
        state: Beta
        scopes:
        - read:watcher:confluence
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: false
      x-atlassian-connect-scope: READ
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Content Watches
      summary: Atlassian Add Content Watcher
      description: 'Adds a user as a watcher to a piece of content. Choose the user by doing<br>one of the following:<br><br>- Specify a user via a query parameter: Use the `accountId` to identify the user.<br>- Do not specify a user: The currently logged-in user will be used.<br><br>Note, you must add the `X-Atlassian-Token: no-check` header when making a<br>request, as this operation has XSRF protection.<br><br>**[Permissions](https://confluence.atlassian.com/x/_AozKw) required**:<br>''Confluence Administrator'' global permission if specifying a user, otherwise<br>permission to access the Confluence site (''Can use'' global permission).'
      operationId: atlassianAddcontentwatcher
      parameters:
      - name: contentId
        in: path
        description: The ID of the content to add the watcher to.
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/userLookupKey'
      - $ref: '#/components/parameters/userLookupUsername'
      - $ref: '#/components/parameters/userLookupAccountId'
      responses:
        '204':
          description: 'Returned if the watcher was successfully created. No response body is

            returned.'
          content: {}
        '403':
          description: 'Returned if;


            - The `X-Atlassian-Token: no-check` header is not specified.

            - The calling user does not have permission to view the

            content.

            - A user is specified via a query parameter and the calling user is

            not a Confluence administrator.

            - No content exists for the specified `contentId`.'
          content: {}
        '404':
          description: Returned if no `contentId` is specified.
          content: {}
      security:
      - basicAuth: []
      - oAuthDefinitions:
        - write:confluence-content
      x-atlassian-oauth2-scopes:
      - scheme: oAuthDefinitions
        state: Current
        scopes:
        - write:confluence-content
      - scheme: oAuthDefinitions
        state: Beta
        scopes:
        - write:watcher:confluence
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: false
      x-atlassian-connect-scope: WRITE
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      tags:
      - Content Watches
      summary: Atlassian Remove Content Watcher
      description: 'Removes a user as a watcher from a piece of content. Choose the user by<br>doing one of the following:<br><br>- Specify a user via a query parameter: Use the `accountId` to identify the user.<br>- Do not specify a user: The currently logged-in user will be used.<br><br>**[Permissions](https://confluence.atlassian.com/x/_AozKw) required**:<br>''Confluence Administrator'' global permission if specifying a user, otherwise<br>permission to access the Confluence site (''Can use'' global permission).'
      operationId: atlassianRemovecontentwatcher
      parameters:
      - name: X-Atlassian-Token
        in: header
        description: 'Note, you must add header when making a

          request, as this operation has XSRF protection.'
        required: true
        schema:
          type: string
          default: no-check
      - name: contentId
        in: path
        description: The ID of the content to remove the watcher from.
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/userLookupKey'
      - $ref: '#/components/parameters/userLookupUsername'
      - $ref: '#/components/parameters/userLookupAccountId'
      responses:
        '204':
          description: 'Returned if the watcher was successfully deleted. No response body is

            returned.'
          content: {}
        '403':
          description: 'Returned if;


            - The `X-Atlassian-Token: no-check` header is not specified.

            - The calling user does not have permission to view the

            content.

            - A user is specified via a query parameter and the calling user is

            not a Confluence administrator.

            - No content exists for the specified `contentId`.'
          content: {}
        '404':
          description: Returned if no `contentId` is specified.
          content: {}
      security:
      - basicAuth: []
      - oAuthDefinitions:
        - write:confluence-content
      x-atlassian-oauth2-scopes:
      - scheme: oAuthDefinitions
        state: Current
        scopes:
        - write:confluence-content
      - scheme: oAuthDefinitions
        state: Beta
        scopes:
        - write:watcher:confluence
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: false
      x-atlassian-connect-scope: WRITE
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
