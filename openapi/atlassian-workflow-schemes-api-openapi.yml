      properties:
        newStatusId:
          description: The ID of the status in the new workflow.
          type: string
        oldStatusId:
          description: The ID of the status in the old workflow that isn't present in the new workflow.
          type: string
      required:
      - newStatusId
      - oldStatusId
      type: object
    WorkflowSchemeReadResponse:
      additionalProperties: false
