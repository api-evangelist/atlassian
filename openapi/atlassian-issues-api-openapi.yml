  /rest/api/3/issue:
    post:
      deprecated: false
      description: Creates an issue or, where the option to create subtasks is enabled in Jira, a subtask. A transition may be applied, to move the issue or subtask to a workflow step other than the default start step, and issue properties set.<br><br>The content of the issue or subtask is defined using `update` and `fields`. The fields that can be set in the issue or subtask are determined using the [ Get create issue metadata](#api-rest-api-3-issue-createmeta-get). These are the same fields that appear on the issue's create screen. Note that the `description`, `environment`, and any `textarea` type custom fields (multi-line text fields) take Atlassian Document Format content. Single line custom fields (`textfield`) accept a string and don't handle Atlassian Document Format content.<br><br>Creating a subtask differs from creating an issue as follows:<br><br> *  `issueType` must be set to a subtask issue type (use [ Get create issue metadata](#api-rest-api-3-issue-createmeta-get) to find subtask issue types).<br> *  `parent` must contain the ID or key of the parent issue.<br><br>In a next-gen project any issue may be made a child providing that the parent and child are members of the same project.<br><br>**[Permissions](#permissions) required:** *Browse projects* and *Create issues* [project permissions](https://confluence.atlassian.com/x/yodKLg) for the project in which the issue or subtask is created.
      operationId: atlassianCreateissue
      parameters:
      - description: Whether the project in which the issue is created is added to the user's **Recently viewed** project list, as shown under **Projects** in Jira. When provided, the issue type and request type are added to the user's history for a project. These values are then used to provide defaults on the issue create screen.
        in: query
        name: updateHistory
        schema:
          default: false
          type: boolean
      requestBody:
        content:
          application/json:
            example:
              fields:
                assignee:
                  id: 5b109f2e9729b51b54dc274d
                components:
                - id: '10000'
                customfield_10000: 09/Jun/19
                customfield_20000: 06/Jul/19 3:25 PM
                customfield_30000:
                - '10000'
                - '10002'
                customfield_40000:
                  content:
                  - content:
                    - text: Occurs on all orders
                      type: text
                    type: paragraph
                  type: doc
                  version: 1
                customfield_50000:
                  content:
                  - content:
                    - text: Could impact day-to-day work.
                      type: text
                    type: paragraph
                  type: doc
                  version: 1
                customfield_60000: jira-software-users
                customfield_70000:
                - jira-administrators
                - jira-software-users
                customfield_80000:
                  value: red
                description:
                  content:
                  - content:
                    - text: Order entry fails when selecting supplier.
                      type: text
                    type: paragraph
                  type: doc
                  version: 1
                duedate: '2019-05-11'
                environment:
                  content:
                  - content:
                    - text: UAT
                      type: text
                    type: paragraph
                  type: doc
                  version: 1
                fixVersions:
                - id: '10001'
                issuetype:
                  id: '10000'
                labels:
                - bugfix
                - blitz_test
                parent:
                  key: PROJ-123
                priority:
                  id: '20000'
                project:
                  id: '10000'
                reporter:
                  id: 5b10a2844c20165700ede21g
                security:
                  id: '10000'
                summary: Main order flow broken
                timetracking:
                  originalEstimate: '10'
                  remainingEstimate: '5'
                versions:
                - id: '10000'
              update: {}
            schema:
              $ref: '#/components/schemas/IssueUpdateDetails'
        required: true
      responses:
        '201':
          content:
            application/json:
              example: '{"id":"10000","key":"ED-24","self":"https://your-domain.atlassian.net/rest/api/3/issue/10000","transition":{"status":200,"errorCollection":{"errorMessages":[],"errors":{}}}}'
              schema:
                $ref: '#/components/schemas/CreatedIssue'
          description: Returned if the request is successful.
        '400':
          content:
            application/json:
              example: '{"errorMessages":["Field ''priority'' is required"],"errors":{}}'
              schema:
                $ref: '#/components/schemas/ErrorCollection'
          description: "Returned if the request:\n\n *  is missing required fields.\n *  contains invalid field values.\n *  contains fields that cannot be set for the issue type.\n *  is by a user who does not have the necessary permission.\n *  is to create a subtype in a project different that of the parent issue.\n *  is for a subtask when the option to create subtasks is disabled.\n *  is invalid for any other reason."
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
          description: Returned if the authentication credentials are incorrect or missing.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
          description: Returned if the user does not have the necessary permission.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
          description: Returned if a configuration problem prevents the creation of the issue. (refer to the [changelog](https://developer.atlassian.com/changelog/#CHANGE-1364) *for more details.*
      security:
      - basicAuth: []
      - OAuth2:
        - write:jira-work
      - {}
      summary: Atlassian Create Issue
      tags:
      - Issues
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: false
      x-atlassian-oauth2-scopes:
      - scheme: OAuth2
        scopes:
        - write:jira-work
        state: Current
      - scheme: OAuth2
        scopes:
        - write:issue:jira
        - write:comment:jira
        - write:comment.property:jira
        - write:attachment:jira
        - read:issue:jira
        state: Beta
      x-atlassian-connect-scope: WRITE
