          type: string
        entryIndex:
          format: int64
          type: integer
        mediaType:
          type: string
        name:
          type: string
        size:
          format: int64
          type: integer
      type: object
    ListWrapperCallbackGroupName:
      additionalProperties: false
      type: object
    AttachmentMetadata:
