      security:
      - oauth2:
        - repository
        - repository:admin
      - basic: []
      - api_key: []
      operationId: atlassianGetARepositoryDeployKey
    put:
      tags:
      - Deployments
      description: 'Create a new deploy key in a repository.<br><br>The same key needs to be passed in but the comment and label can change.<br><br>Example:<br>```<br>$ curl -X PUT \<br>-H "Authorization " \<br>-H "Content-type: application/json" \<br>https://api.bitbucket.org/2.0/repositories/mleu/test/deploy-keys/1234 -d \<br>''{<br>    "label": "newlabel",<br>    "key": "ssh-rsa  newcomment",<br>}''<br>```'
