      - app-access-rule-exempt: true
      x-atlassian-oauth2-scopes:
      - scheme: OAuth2
        scopes:
        - read:jira-work
        state: Current
      - scheme: OAuth2
        scopes:
        - read:permission:jira
        - read:project:jira
        state: Beta
      x-atlassian-connect-scope: READ
  /rest/api/3/mypermissions:
    get:
      deprecated: false
      description: Returns a list of permissions indicating which permissions the user has. Details of the user's permissions can be obtained in a global, project, issue or comment context.<br><br>The user is reported as having a project permission:<br><br> *  in the global context, if the user has the project permission in any project.<br> *  for a project, where the project permission is determined using issue data, if the user meets the permission's criteria for any issue in the project. Otherwise, if the user has the project permission in the project.<br> *  for an issue, where a project permission is determined using issue data, if the user has the permission in the issue. Otherwise, if the user has the project permission in the project containing the issue.<br> *  for a comment, where the user has both the permission to browse the comment and the project permission for the comment's parent issue. Only the BROWSE\_PROJECTS permission is supported. If a `commentId` is provided whose `permissions` does not equal BROWSE\_PROJECTS, a 400 error will be returned.<br><br>This means that users may be shown as having an issue permission (such as EDIT\_ISSUES) in the global context or a project context but may not have the permission for any or all issues. For example, if Reporters have the EDIT\_ISSUES permission a user would be shown as having this permission in the global context or the context of a project, because any user can be a reporter. However, if they are not the user who reported the issue queried they would not have EDIT\_ISSUES permission for that issue.<br><br>Global permissions are unaffected by context.<br><br>This operation can be accessed anonymously.<br><br>**[Permissions](#permissions) required:** None.
      operationId: atlassianGetmypermissions
      parameters:
      - description: The key of project. Ignored if `projectId` is provided.
        in: query
        name: projectKey
        schema:
          type: string
      - description: The ID of project.
        in: query
        name: projectId
        schema:
          type: string
      - description: The key of the issue. Ignored if `issueId` is provided.
        in: query
        name: issueKey
        schema:
          type: string
      - description: The ID of the issue.
        in: query
        name: issueId
        schema:
          type: string
      - description: A list of permission keys. (Required) This parameter accepts a comma-separated list. To get the list of available permissions, use [Get all permissions](#api-rest-api-3-permissions-get).
        in: query
        name: permissions
        schema:
          example: BROWSE_PROJECTS,EDIT_ISSUES
          type: string
        x-changes:
        - announced: '2018-08-01'
          details: https://developer.atlassian.com/cloud/jira/platform/change-notice-get-my-permissions-requires-permissions-query-parameter/
          effective: '2019-02-01'
          type: required
        x-showInExample: 'true'
      - in: query
        name: projectUuid
        schema:
          type: string
      - in: query
        name: projectConfigurationUuid
        schema:
          type: string
      - description: The ID of the comment.
        in: query
        name: commentId
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example: '{"permissions":{"EDIT_ISSUES":{"description":"Ability to edit issues.","havePermission":true,"id":"12","key":"EDIT_ISSUES","name":"Edit Issues","type":"PROJECT"}}}'
              schema:
                $ref: '#/components/schemas/Permissions'
          description: Returned if the request is successful.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
          description: Returned if `permissions` is empty, contains an invalid key, or does not equal BROWSE\_PROJECTS when commentId is provided.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
          description: Returned if the authentication credentials are incorrect or missing.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
          description: Returned if the project or issue is not found or the user does not have permission to view the project or issue.
      security:
      - basicAuth: []
      - OAuth2:
        - read:jira-work
      - {}
      summary: Atlassian Get My Permissions
      tags:
      - Permissions
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: true
      x-atlassian-oauth2-scopes:
      - scheme: OAuth2
        scopes:
        - read:jira-work
        state: Current
      - scheme: OAuth2
        scopes:
        - read:permission:jira
        state: Beta
      x-atlassian-connect-scope: READ
  /rest/api/3/permissions:
    get:
      deprecated: false
      description: Returns all permissions, including:<br><br> *  global permissions.<br> *  project permissions.<br> *  global permissions added by plugins.<br><br>This operation can be accessed anonymously.<br><br>**[Permissions](#permissions) required:** None.
      operationId: atlassianGetallpermissions
      parameters: []
      responses:
        '200':
          content:
            application/json:
              example: '{"permissions":{"BULK_CHANGE":{"description":"Ability to modify a collection of issues at once. For example, resolve multiple issues in one step.","key":"BULK_CHANGE","name":"Bulk Change","type":"GLOBAL"}}}'
              schema:
                $ref: '#/components/schemas/Permissions'
          description: Returned if the request is successful.
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
        '403':
          description: Returned if the user does not have the necessary permission.
      security:
      - basicAuth: []
      - OAuth2:
        - manage:jira-configuration
      - {}
      summary: Atlassian Get All Permissions
      tags:
      - Permissions
      x-atlassian-data-security-policy:
      - app-access-rule-exempt: true
      x-atlassian-oauth2-scopes:
      - scheme: OAuth2
        scopes:
        - manage:jira-configuration
        state: Current
      - scheme: OAuth2
        scopes:
        - read:permission:jira
        state: Beta
      x-atlassian-connect-scope: ADMIN
