specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Atlassian
providerId: atlassian
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - DevOps
description: Atlassian Cloud APIs share a per-app, per-user rate limiter.
sources:
  - https://www.atlassian.com/pricing
  - https://developer.atlassian.com/cloud/jira/platform/rate-limiting/
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Per-app per-user-per-tenant
    scope: app/user/tenant
    metric: requests_per_second
    limit: 10
    timeFrame: second
  - name: Cross-product API
    scope: tenant
    metric: requests_per_minute
    limit: varies
  - name: Webhooks
    scope: tenant
    metric: deliveries_per_second
    limit: 100
    timeFrame: second
