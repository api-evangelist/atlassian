naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Unapprove
  description: 'Atlassian Bit Bucket Repositories API — Unapprove. 2 operations. Lead operation: Atlassian Unapprove Commit.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Unapprove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-unapprove
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Unapprove business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-commit-commit-approve
      path: /repositories/{workspace}/{repo_slug}/commit/{commit}/approve
      operations:
      - name: unapprovecommit
        method: DELETE
        description: Atlassian Unapprove Commit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-workspace-repo_slug-pullrequests-pull_request_id-approve
      path: /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/approve
      operations:
      - name: unapprovepullrequest
        method: DELETE
        description: Atlassian Unapprove Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-unapprove-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Unapprove. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/commit/{commit}/approve
      name: repositories-workspace-repo-slug-commit-commit-approve
      description: REST surface for repositories-workspace-repo_slug-commit-commit-approve.
      operations:
      - method: DELETE
        name: unapprovecommit
        description: Atlassian Unapprove Commit
        call: bitbucket-repositories-unapprove.unapprovecommit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/pullrequests/{pull-request-id}/approve
      name: repositories-workspace-repo-slug-pullrequests-pull-request-id-approve
      description: REST surface for repositories-workspace-repo_slug-pullrequests-pull_request_id-approve.
      operations:
      - method: DELETE
        name: unapprovepullrequest
        description: Atlassian Unapprove Pull Request
        call: bitbucket-repositories-unapprove.unapprovepullrequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-unapprove-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Unapprove. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-unapprove-commit
      description: Atlassian Unapprove Commit
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-repositories-unapprove.unapprovecommit
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-unapprove-pull-request
      description: Atlassian Unapprove Pull Request
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-repositories-unapprove.unapprovepullrequest
      outputParameters:
      - type: object
        mapping: $.
