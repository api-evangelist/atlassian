naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Workspaces API — Keys
  description: 'Atlassian Bit Bucket Workspaces API — Keys. 4 operations. Lead operation: Atlassian Get Keys for Oidc in Pipelines.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-workspaces-keys
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Workspaces API — Keys business capability. Self-contained, no shared references.
    resources:
    - name: workspaces-workspace-pipelines-config-identity-oidc-keys.json
      path: /workspaces/{workspace}/pipelines-config/identity/oidc/keys.json
      operations:
      - name: atlassiangetoidckeys
        method: GET
        description: Atlassian Get Keys for Oidc in Pipelines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: This can either be the workspace ID (slug) or the workspace UUID surrounded by curly-braces, for example
            `{workspace UUID}`.
          required: true
    - name: workspaces-workspace-projects-project_key-deploy-keys
      path: /workspaces/{workspace}/projects/{project_key}/deploy-keys
      operations:
      - name: atlassianlistprojectdeploykeys
        method: GET
        description: Atlassian List Project Deploy Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: atlassiancreateaprojectdeploykey
        method: POST
        description: Atlassian Create a Project Deploy Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: workspaces-workspace-projects-project_key-deploy-keys-key_id
      path: /workspaces/{workspace}/projects/{project_key}/deploy-keys/{key_id}
      operations:
      - name: atlassiangetaprojectdeploykey
        method: GET
        description: Atlassian Get a Project Deploy Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bitbucket-workspaces-keys-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Workspaces API — Keys. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/workspaces/{workspace}/pipelines-config/identity/oidc/keys-json
      name: workspaces-workspace-pipelines-config-identity-oidc-keys-json
      description: REST surface for workspaces-workspace-pipelines-config-identity-oidc-keys.json.
      operations:
      - method: GET
        name: atlassiangetoidckeys
        description: Atlassian Get Keys for Oidc in Pipelines
        call: bitbucket-workspaces-keys.atlassiangetoidckeys
        with:
          workspace: rest.workspace
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workspaces/{workspace}/projects/{project-key}/deploy-keys
      name: workspaces-workspace-projects-project-key-deploy-keys
      description: REST surface for workspaces-workspace-projects-project_key-deploy-keys.
      operations:
      - method: GET
        name: atlassianlistprojectdeploykeys
        description: Atlassian List Project Deploy Keys
        call: bitbucket-workspaces-keys.atlassianlistprojectdeploykeys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: atlassiancreateaprojectdeploykey
        description: Atlassian Create a Project Deploy Key
        call: bitbucket-workspaces-keys.atlassiancreateaprojectdeploykey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workspaces/{workspace}/projects/{project-key}/deploy-keys/{key-id}
      name: workspaces-workspace-projects-project-key-deploy-keys-key-id
      description: REST surface for workspaces-workspace-projects-project_key-deploy-keys-key_id.
      operations:
      - method: GET
        name: atlassiangetaprojectdeploykey
        description: Atlassian Get a Project Deploy Key
        call: bitbucket-workspaces-keys.atlassiangetaprojectdeploykey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-workspaces-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Workspaces API — Keys. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-get-keys-oidc-pipelines
      description: Atlassian Get Keys for Oidc in Pipelines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-workspaces-keys.atlassiangetoidckeys
      with:
        workspace: tools.workspace
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-list-project-deploy-keys
      description: Atlassian List Project Deploy Keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-workspaces-keys.atlassianlistprojectdeploykeys
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-create-project-deploy-key
      description: Atlassian Create a Project Deploy Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-workspaces-keys.atlassiancreateaprojectdeploykey
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-project-deploy-key
      description: Atlassian Get a Project Deploy Key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-workspaces-keys.atlassiangetaprojectdeploykey
      outputParameters:
      - type: object
        mapping: $.
