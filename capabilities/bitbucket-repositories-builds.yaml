        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: This can either be the workspace ID (slug) or the workspace UUID surrounded by curly-braces, for example
            `{workspace UUID}`.
          required: true
        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
        - name: pipeline_uuid
          in: path
          type: string
          description: The UUID of the pipeline.
          required: true
        - name: step_uuid
          in: path
          type: string
          description: The UUID of the step.
          required: true
        - name: log_uuid
          in: path
          type: string
          description: For the main build container specify the step UUID; for a service container specify the service container
            UUID
          required: true
