naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Exports
  description: 'Atlassian Bit Bucket Repositories API — Exports. 2 operations. Lead operation: Atlassian Export Issues. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Exports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-exports
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Exports business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-issues-export
      path: /repositories/{workspace}/{repo_slug}/issues/export
      operations:
      - name: exportissues
        method: POST
        description: Atlassian Export Issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: repositories-workspace-repo_slug-issues-export-repo_name}-issues-{task_id}.zip
      path: /repositories/{workspace}/{repo_slug}/issues/export/{repo_name}-issues-{task_id}.zip
      operations:
      - name: checkissueexportstatus
        method: GET
        description: Atlassian Check Issue Export Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-exports-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Exports. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/issues/export
      name: repositories-workspace-repo-slug-issues-export
      description: REST surface for repositories-workspace-repo_slug-issues-export.
      operations:
      - method: POST
        name: exportissues
        description: Atlassian Export Issues
        call: bitbucket-repositories-exports.exportissues
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/issues/export/repo-name-issues-task-id-zip
      name: repositories-workspace-repo-slug-issues-export-repo-name-issues-task-id-zip
      description: REST surface for repositories-workspace-repo_slug-issues-export-repo_name}-issues-{task_id}.zip.
      operations:
      - method: GET
        name: checkissueexportstatus
        description: Atlassian Check Issue Export Status
        call: bitbucket-repositories-exports.checkissueexportstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-exports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Exports. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-export-issues
      description: Atlassian Export Issues
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-repositories-exports.exportissues
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-check-issue-export-status
      description: Atlassian Check Issue Export Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-exports.checkissueexportstatus
      outputParameters:
      - type: object
        mapping: $.
