naftiko: 1.0.0-alpha2
info:
  label: Atlassian The Jira Cloud platform REST API — JQL Functions (Apps)
  description: 'Atlassian The Jira Cloud platform REST API — JQL Functions (Apps). 2 operations. Lead operation: Atlassian
    Get Precomputations Apps. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - JQL Functions (Apps)
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: jira-jql-functions-apps
    baseUri: https://your-domain.atlassian.net
    description: Atlassian The Jira Cloud platform REST API — JQL Functions (Apps) business capability. Self-contained, no
      shared references.
    resources:
    - name: rest-api-3-jql-function-computation
      path: /rest/api/3/jql/function/computation
      operations:
      - name: atlassiangetprecomputations
        method: GET
        description: Atlassian Get Precomputations Apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: functionKey
          in: query
          type: array
          description: 'The function key in format:'
        - name: startAt
          in: query
          type: integer
          description: The index of the first item to return in a page of results (page offset).
        - name: maxResults
          in: query
          type: integer
          description: The maximum number of items to return per page.
        - name: orderBy
          in: query
          type: string
          description: '[Order](#ordering) the results by a field:'
      - name: atlassianupdateprecomputations
        method: POST
        description: Atlassian Update Precomputations Apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: jira-jql-functions-apps-rest
    port: 8080
    description: REST adapter for Atlassian The Jira Cloud platform REST API — JQL Functions (Apps). One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/3/jql/function/computation
      name: rest-api-3-jql-function-computation
      description: REST surface for rest-api-3-jql-function-computation.
      operations:
      - method: GET
        name: atlassiangetprecomputations
        description: Atlassian Get Precomputations Apps
        call: jira-jql-functions-apps.atlassiangetprecomputations
        with:
          functionKey: rest.functionKey
          startAt: rest.startAt
          maxResults: rest.maxResults
          orderBy: rest.orderBy
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: atlassianupdateprecomputations
        description: Atlassian Update Precomputations Apps
        call: jira-jql-functions-apps.atlassianupdateprecomputations
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: jira-jql-functions-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian The Jira Cloud platform REST API — JQL Functions (Apps). One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: atlassian-get-precomputations-apps
      description: Atlassian Get Precomputations Apps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jira-jql-functions-apps.atlassiangetprecomputations
      with:
        functionKey: tools.functionKey
        startAt: tools.startAt
        maxResults: tools.maxResults
        orderBy: tools.orderBy
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-update-precomputations-apps
      description: Atlassian Update Precomputations Apps
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: jira-jql-functions-apps.atlassianupdateprecomputations
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
