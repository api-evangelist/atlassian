naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Snippets API — Delete
  description: 'Atlassian Bit Bucket Snippets API — Delete. 3 operations. Lead operation: Atlassian Delete Snippet. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-snippets-delete
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Snippets API — Delete business capability. Self-contained, no shared references.
    resources:
    - name: snippets-workspace-encoded_id
      path: /snippets/{workspace}/{encoded_id}
      operations:
      - name: deletesnippet
        method: DELETE
        description: Atlassian Delete Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: snippets-workspace-encoded_id-comments-comment_id
      path: /snippets/{workspace}/{encoded_id}/comments/{comment_id}
      operations:
      - name: deletecommentonsnippet
        method: DELETE
        description: Atlassian Delete Comment on Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: snippets-workspace-encoded_id-node_id
      path: /snippets/{workspace}/{encoded_id}/{node_id}
      operations:
      - name: deletepreviousrevisionofsnippet
        method: DELETE
        description: Atlassian Delete Previous Revision of Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bitbucket-snippets-delete-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Snippets API — Delete. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/snippets/{workspace}/{encoded-id}
      name: snippets-workspace-encoded-id
      description: REST surface for snippets-workspace-encoded_id.
      operations:
      - method: DELETE
        name: deletesnippet
        description: Atlassian Delete Snippet
        call: bitbucket-snippets-delete.deletesnippet
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/snippets/{workspace}/{encoded-id}/comments/{comment-id}
      name: snippets-workspace-encoded-id-comments-comment-id
      description: REST surface for snippets-workspace-encoded_id-comments-comment_id.
      operations:
      - method: DELETE
        name: deletecommentonsnippet
        description: Atlassian Delete Comment on Snippet
        call: bitbucket-snippets-delete.deletecommentonsnippet
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/snippets/{workspace}/{encoded-id}/{node-id}
      name: snippets-workspace-encoded-id-node-id
      description: REST surface for snippets-workspace-encoded_id-node_id.
      operations:
      - method: DELETE
        name: deletepreviousrevisionofsnippet
        description: Atlassian Delete Previous Revision of Snippet
        call: bitbucket-snippets-delete.deletepreviousrevisionofsnippet
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-snippets-delete-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Snippets API — Delete. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-delete-snippet
      description: Atlassian Delete Snippet
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-snippets-delete.deletesnippet
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-delete-comment-snippet
      description: Atlassian Delete Comment on Snippet
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-snippets-delete.deletecommentonsnippet
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-delete-previous-revision-snippet
      description: Atlassian Delete Previous Revision of Snippet
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-snippets-delete.deletepreviousrevisionofsnippet
      outputParameters:
      - type: object
        mapping: $.
