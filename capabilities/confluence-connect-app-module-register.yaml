naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Connect App Module API — Register
  description: 'Atlassian Confluence Connect App Module API — Register. 1 operations. Lead operation: Atlassian Register Modules.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Register
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-connect-app-module-register
    baseUri: ''
    description: Atlassian Confluence Connect App Module API — Register business capability. Self-contained, no shared references.
    resources:
    - name: atlassian-connect-1-app-module-dynamic
      path: /atlassian-connect/1/app/module/dynamic
      operations:
      - name: registermodules
        method: POST
        description: Atlassian Register Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-connect-app-module-register-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Connect App Module API — Register. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/atlassian-connect/1/app/module/dynamic
      name: atlassian-connect-1-app-module-dynamic
      description: REST surface for atlassian-connect-1-app-module-dynamic.
      operations:
      - method: POST
        name: registermodules
        description: Atlassian Register Modules
        call: confluence-connect-app-module-register.registermodules
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-connect-app-module-register-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Connect App Module API — Register. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: atlassian-register-modules
      description: Atlassian Register Modules
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: confluence-connect-app-module-register.registermodules
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
