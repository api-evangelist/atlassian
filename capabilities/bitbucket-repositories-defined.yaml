naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Defined
  description: 'Atlassian Bit Bucket Repositories API — Defined. 2 operations. Lead operation: Atlassian List Defined Versions
    for Issues. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Defined
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-defined
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Defined business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-versions
      path: /repositories/{workspace}/{repo_slug}/versions
      operations:
      - name: listdefinedversionsforissues
        method: GET
        description: Atlassian List Defined Versions for Issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-workspace-repo_slug-versions-version_id
      path: /repositories/{workspace}/{repo_slug}/versions/{version_id}
      operations:
      - name: getdefinedversionforissues
        method: GET
        description: Atlassian Get Defined Version for Issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-defined-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Defined. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/versions
      name: repositories-workspace-repo-slug-versions
      description: REST surface for repositories-workspace-repo_slug-versions.
      operations:
      - method: GET
        name: listdefinedversionsforissues
        description: Atlassian List Defined Versions for Issues
        call: bitbucket-repositories-defined.listdefinedversionsforissues
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/versions/{version-id}
      name: repositories-workspace-repo-slug-versions-version-id
      description: REST surface for repositories-workspace-repo_slug-versions-version_id.
      operations:
      - method: GET
        name: getdefinedversionforissues
        description: Atlassian Get Defined Version for Issues
        call: bitbucket-repositories-defined.getdefinedversionforissues
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-defined-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Defined. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-list-defined-versions-issues
      description: Atlassian List Defined Versions for Issues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-defined.listdefinedversionsforissues
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-defined-version-issues
      description: Atlassian Get Defined Version for Issues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-defined.getdefinedversionforissues
      outputParameters:
      - type: object
        mapping: $.
