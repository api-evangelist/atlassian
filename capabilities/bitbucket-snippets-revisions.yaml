naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Snippets API — Revisions
  description: 'Atlassian Bit Bucket Snippets API — Revisions. 3 operations. Lead operation: Atlassian Delete Previous Revision
    of Snippet. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Revisions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-snippets-revisions
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Snippets API — Revisions business capability. Self-contained, no shared references.
    resources:
    - name: snippets-workspace-encoded_id-node_id
      path: /snippets/{workspace}/{encoded_id}/{node_id}
      operations:
      - name: deletepreviousrevisionofsnippet
        method: DELETE
        description: Atlassian Delete Previous Revision of Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getpreviousrevisionofsnippet
        method: GET
        description: Atlassian Get Previous Revision of Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatepreviousrevisionofsnippet
        method: PUT
        description: Atlassian Update Previous Revision of Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bitbucket-snippets-revisions-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Snippets API — Revisions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/snippets/{workspace}/{encoded-id}/{node-id}
      name: snippets-workspace-encoded-id-node-id
      description: REST surface for snippets-workspace-encoded_id-node_id.
      operations:
      - method: DELETE
        name: deletepreviousrevisionofsnippet
        description: Atlassian Delete Previous Revision of Snippet
        call: bitbucket-snippets-revisions.deletepreviousrevisionofsnippet
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getpreviousrevisionofsnippet
        description: Atlassian Get Previous Revision of Snippet
        call: bitbucket-snippets-revisions.getpreviousrevisionofsnippet
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatepreviousrevisionofsnippet
        description: Atlassian Update Previous Revision of Snippet
        call: bitbucket-snippets-revisions.updatepreviousrevisionofsnippet
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-snippets-revisions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Snippets API — Revisions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-delete-previous-revision-snippet
      description: Atlassian Delete Previous Revision of Snippet
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-snippets-revisions.deletepreviousrevisionofsnippet
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-previous-revision-snippet
      description: Atlassian Get Previous Revision of Snippet
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-snippets-revisions.getpreviousrevisionofsnippet
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-update-previous-revision-snippet
      description: Atlassian Update Previous Revision of Snippet
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bitbucket-snippets-revisions.updatepreviousrevisionofsnippet
      outputParameters:
      - type: object
        mapping: $.
