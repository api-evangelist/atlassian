  - type: http
    namespace: bitbucket-workspaces-update
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Workspaces API — Update business capability. Self-contained, no shared references.
    resources:
    - name: workspaces-workspace-hooks-uid
      path: /workspaces/{workspace}/hooks/{uid}
      operations:
      - name: atlassianupdateawebhookforaworkspace
        method: PUT
        description: Atlassian Update a Webhook for a Workspace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: workspaces-workspace-pipelines-config-variables-variable_uuid
      path: /workspaces/{workspace}/pipelines-config/variables/{variable_uuid}
      operations:
      - name: atlassianupdatepipelinevariableforworkspace
        method: PUT
        description: Atlassian Update Variable for a Workspace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: This can either be the workspace ID (slug) or the workspace UUID surrounded by curly-braces, for example
            `{workspace UUID}`.
          required: true
        - name: variable_uuid
          in: path
          type: string
          description: The UUID of the variable.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: workspaces-workspace-projects-project_key
      path: /workspaces/{workspace}/projects/{project_key}
      operations:
      - name: atlassianupdateaprojectforaworkspace
        method: PUT
        description: Atlassian Update a Project for a Workspace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: workspaces-workspace-projects-project_key-branching-model-settings
      path: /workspaces/{workspace}/projects/{project_key}/branching-model/settings
      operations:
      - name: atlassianupdatethebranchingmodelconfigforaproject
        method: PUT
