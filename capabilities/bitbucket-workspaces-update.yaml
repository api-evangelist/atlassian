naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Workspaces API — Update
  description: 'Atlassian Bit Bucket Workspaces API — Update. 6 operations. Lead operation: Atlassian Update a Webhook for
    a Workspace. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Update
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
