naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Teams API — Get
  description: 'Atlassian Bit Bucket Teams API — Get. 1 operations. Lead operation: Atlassian Get Variable for Team. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-teams-get
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Teams API — Get business capability. Self-contained, no shared references.
    resources:
    - name: teams-username-pipelines_config-variables-variable_uuid
      path: /teams/{username}/pipelines_config/variables/{variable_uuid}
      operations:
      - name: getvariableforteam
        method: GET
        description: Atlassian Get Variable for Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The account.
          required: true
        - name: variable_uuid
          in: path
          type: string
          description: The UUID of the variable to retrieve.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-teams-get-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Teams API — Get. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/teams/{username}/pipelines-config/variables/{variable-uuid}
      name: teams-username-pipelines-config-variables-variable-uuid
      description: REST surface for teams-username-pipelines_config-variables-variable_uuid.
      operations:
      - method: GET
        name: getvariableforteam
        description: Atlassian Get Variable for Team
        call: bitbucket-teams-get.getvariableforteam
        with:
          username: rest.username
          variable_uuid: rest.variable_uuid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-teams-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Teams API — Get. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: atlassian-get-variable-team
      description: Atlassian Get Variable for Team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-teams-get.getvariableforteam
      with:
        username: tools.username
        variable_uuid: tools.variable_uuid
      outputParameters:
      - type: object
        mapping: $.
