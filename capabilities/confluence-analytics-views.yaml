naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Analytics API — Views
  description: 'Atlassian Confluence Analytics API — Views. 1 operations. Lead operation: Atlassian Get Views. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Views
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-analytics-views
    baseUri: ''
    description: Atlassian Confluence Analytics API — Views business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-analytics-content-contentId-views
      path: /wiki/rest/api/analytics/content/{contentId}/views
      operations:
      - name: getviews
        method: GET
        description: Atlassian Get Views
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contentId
          in: path
          type: string
          description: The ID of the content to get the views for.
          required: true
        - name: fromDate
          in: query
          type: string
          description: The number of views for the content since the date.
  exposes:
  - type: rest
    namespace: confluence-analytics-views-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Analytics API — Views. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/analytics/content/{contentid}/views
      name: wiki-rest-api-analytics-content-contentid-views
      description: REST surface for wiki-rest-api-analytics-content-contentId-views.
      operations:
      - method: GET
        name: getviews
        description: Atlassian Get Views
        call: confluence-analytics-views.getviews
        with:
          contentId: rest.contentId
          fromDate: rest.fromDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-analytics-views-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Analytics API — Views. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-get-views
      description: Atlassian Get Views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-analytics-views.getviews
      with:
        contentId: tools.contentId
        fromDate: tools.fromDate
      outputParameters:
      - type: object
        mapping: $.
