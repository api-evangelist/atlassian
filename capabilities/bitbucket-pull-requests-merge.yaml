naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Pull Requests API — Merge
  description: 'Atlassian Bit Bucket Pull Requests API — Merge. 2 operations. Lead operation: Atlassian Merge Pull Request.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Merge
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-pull-requests-merge
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Pull Requests API — Merge business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-pullrequests-pull_request_id-merge
      path: /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/merge
      operations:
      - name: mergepullrequest
        method: POST
        description: Atlassian Merge Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: async
          in: query
          type: boolean
          description: Default value is false.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: repositories-workspace-repo_slug-pullrequests-pull_request_id-merge-task-status-
      path: /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/merge/task-status/{task_id}
      operations:
      - name: getthemergetaskstatusforpullrequest
        method: GET
        description: Atlassian Get the Merge Task Status for Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-pull-requests-merge-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Pull Requests API — Merge. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/pullrequests/{pull-request-id}/merge
      name: repositories-workspace-repo-slug-pullrequests-pull-request-id-merge
      description: REST surface for repositories-workspace-repo_slug-pullrequests-pull_request_id-merge.
      operations:
      - method: POST
        name: mergepullrequest
        description: Atlassian Merge Pull Request
        call: bitbucket-pull-requests-merge.mergepullrequest
        with:
          async: rest.async
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/pullrequests/{pull-request-id}/merge/task-status/{task-id}
      name: repositories-workspace-repo-slug-pullrequests-pull-request-id-merge-task-status
      description: REST surface for repositories-workspace-repo_slug-pullrequests-pull_request_id-merge-task-status-.
      operations:
      - method: GET
        name: getthemergetaskstatusforpullrequest
        description: Atlassian Get the Merge Task Status for Pull Request
        call: bitbucket-pull-requests-merge.getthemergetaskstatusforpullrequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-pull-requests-merge-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Pull Requests API — Merge. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-merge-pull-request
      description: Atlassian Merge Pull Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-pull-requests-merge.mergepullrequest
      with:
        async: tools.async
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-merge-task-status
      description: Atlassian Get the Merge Task Status for Pull Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-pull-requests-merge.getthemergetaskstatusforpullrequest
      outputParameters:
      - type: object
        mapping: $.
