naftiko: 1.0.0-alpha2
info:
  label: Atlassian Admin API — Domains
  description: 'Atlassian Admin API — Domains. 2 operations. Lead operation: Atlassian Get Organization Domains. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-domains
    baseUri: https://api.atlassian.com
    description: Atlassian Admin API — Domains business capability. Self-contained, no shared references.
    resources:
    - name: v1-orgs-orgId-domains
      path: /v1/orgs/{orgId}/domains
      operations:
      - name: getorganizationdomains
        method: GET
        description: Atlassian Get Organization Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
          description: Cursor for paginated results.
    - name: v1-orgs-orgId-domains-domainId
      path: /v1/orgs/{orgId}/domains/{domainId}
      operations:
      - name: getdomainbyid
        method: GET
        description: Atlassian Get Domain by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainId
          in: path
          type: string
          description: The unique identifier of the domain.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-domains-rest
    port: 8080
    description: REST adapter for Atlassian Admin API — Domains. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/orgs/{orgid}/domains
      name: v1-orgs-orgid-domains
      description: REST surface for v1-orgs-orgId-domains.
      operations:
      - method: GET
        name: getorganizationdomains
        description: Atlassian Get Organization Domains
        call: admin-domains.getorganizationdomains
        with:
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/orgs/{orgid}/domains/{domainid}
      name: v1-orgs-orgid-domains-domainid
      description: REST surface for v1-orgs-orgId-domains-domainId.
      operations:
      - method: GET
        name: getdomainbyid
        description: Atlassian Get Domain by Id
        call: admin-domains.getdomainbyid
        with:
          domainId: rest.domainId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Admin API — Domains. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: atlassian-get-organization-domains
      description: Atlassian Get Organization Domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-domains.getorganizationdomains
      with:
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-domain-id
      description: Atlassian Get Domain by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-domains.getdomainbyid
      with:
        domainId: tools.domainId
      outputParameters:
      - type: object
        mapping: $.
