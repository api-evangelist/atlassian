naftiko: 1.0.0-alpha2
info:
  label: Atlassian wiki/rest/api/space/ — Content Watches
  description: 'Atlassian wiki/rest/api/space/ — Content Watches. 1 operations. Lead operation: Atlassian Get Space Watchers.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Content Watches
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: wiki-rest-api-space--content-watches
    baseUri: ''
    description: Atlassian wiki/rest/api/space/ — Content Watches business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-space-spaceKey-watch
      path: /wiki/rest/api/space/{spaceKey}/watch
      operations:
      - name: atlassiangetwatchersforspace
        method: GET
        description: Atlassian Get Space Watchers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: spaceKey
          in: path
          type: string
          description: The key of the space to get watchers.
          required: true
        - name: start
          in: query
          type: string
          description: The start point of the collection to return.
        - name: limit
          in: query
          type: string
          description: The limit of the number of items to return, this may be restricted by fixed system limits.
  exposes:
  - type: rest
    namespace: wiki-rest-api-space--content-watches-rest
    port: 8080
    description: REST adapter for Atlassian wiki/rest/api/space/ — Content Watches. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/space/{spacekey}/watch
      name: wiki-rest-api-space-spacekey-watch
      description: REST surface for wiki-rest-api-space-spaceKey-watch.
      operations:
      - method: GET
        name: atlassiangetwatchersforspace
        description: Atlassian Get Space Watchers
        call: wiki-rest-api-space--content-watches.atlassiangetwatchersforspace
        with:
          spaceKey: rest.spaceKey
          start: rest.start
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wiki-rest-api-space--content-watches-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian wiki/rest/api/space/ — Content Watches. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-space-watchers
      description: Atlassian Get Space Watchers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wiki-rest-api-space--content-watches.atlassiangetwatchersforspace
      with:
        spaceKey: tools.spaceKey
        start: tools.start
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
