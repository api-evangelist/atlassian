      - method: POST
        name: requestchangesforpullrequest
        description: Atlassian Request Changes for Pull Request
        call: bitbucket-repositories-changes.requestchangesforpullrequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
