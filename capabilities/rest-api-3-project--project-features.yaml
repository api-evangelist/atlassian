naftiko: 1.0.0-alpha2
info:
  label: Atlassian rest/api/3/project/ — Project Features
  description: 'Atlassian rest/api/3/project/ — Project Features. 2 operations. Lead operation: Atlassian Get Project Features.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Project Features
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-api-3-project--project-features
    baseUri: https://your-domain.atlassian.net
    description: Atlassian rest/api/3/project/ — Project Features business capability. Self-contained, no shared references.
    resources:
    - name: rest-api-3-project-projectIdOrKey-features
      path: /rest/api/3/project/{projectIdOrKey}/features
      operations:
      - name: atlassiangetfeaturesforproject
        method: GET
        description: Atlassian Get Project Features
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectIdOrKey
          in: path
          type: string
          description: The ID or (case-sensitive) key of the project.
          required: true
    - name: rest-api-3-project-projectIdOrKey-features-featureKey
      path: /rest/api/3/project/{projectIdOrKey}/features/{featureKey}
      operations:
      - name: atlassiantogglefeatureforproject
        method: PUT
        description: Atlassian Set Project Feature State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectIdOrKey
          in: path
          type: string
          description: The ID or (case-sensitive) key of the project.
          required: true
        - name: featureKey
          in: path
          type: string
          description: The key of the feature.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: rest-api-3-project--project-features-rest
    port: 8080
    description: REST adapter for Atlassian rest/api/3/project/ — Project Features. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/3/project/{projectidorkey}/features
      name: rest-api-3-project-projectidorkey-features
      description: REST surface for rest-api-3-project-projectIdOrKey-features.
      operations:
      - method: GET
        name: atlassiangetfeaturesforproject
        description: Atlassian Get Project Features
        call: rest-api-3-project--project-features.atlassiangetfeaturesforproject
        with:
          projectIdOrKey: rest.projectIdOrKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/3/project/{projectidorkey}/features/{featurekey}
      name: rest-api-3-project-projectidorkey-features-featurekey
      description: REST surface for rest-api-3-project-projectIdOrKey-features-featureKey.
      operations:
      - method: PUT
        name: atlassiantogglefeatureforproject
        description: Atlassian Set Project Feature State
        call: rest-api-3-project--project-features.atlassiantogglefeatureforproject
        with:
          projectIdOrKey: rest.projectIdOrKey
          featureKey: rest.featureKey
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-api-3-project--project-features-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian rest/api/3/project/ — Project Features. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-project-features
      description: Atlassian Get Project Features
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-api-3-project--project-features.atlassiangetfeaturesforproject
      with:
        projectIdOrKey: tools.projectIdOrKey
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-set-project-feature-state
      description: Atlassian Set Project Feature State
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-api-3-project--project-features.atlassiantogglefeatureforproject
      with:
        projectIdOrKey: tools.projectIdOrKey
        featureKey: tools.featureKey
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
