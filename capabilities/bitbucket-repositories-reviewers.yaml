naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Reviewers
  description: 'Atlassian Bit Bucket Repositories API — Reviewers. 3 operations. Lead operation: Atlassian List Default Reviewers.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Reviewers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-reviewers
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Reviewers business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-default-reviewers
      path: /repositories/{workspace}/{repo_slug}/default-reviewers
      operations:
      - name: listdefaultreviewers
        method: GET
        description: Atlassian List Default Reviewers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-workspace-repo_slug-default-reviewers-target_username
      path: /repositories/{workspace}/{repo_slug}/default-reviewers/{target_username}
      operations:
      - name: addusertothedefaultreviewers
        method: PUT
        description: Atlassian Add User to the Default Reviewers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-workspace-repo_slug-effective-default-reviewers
      path: /repositories/{workspace}/{repo_slug}/effective-default-reviewers
      operations:
      - name: listeffectivedefaultreviewers
        method: GET
        description: Atlassian List Effective Default Reviewers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-reviewers-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Reviewers. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/default-reviewers
      name: repositories-workspace-repo-slug-default-reviewers
      description: REST surface for repositories-workspace-repo_slug-default-reviewers.
      operations:
      - method: GET
        name: listdefaultreviewers
        description: Atlassian List Default Reviewers
        call: bitbucket-repositories-reviewers.listdefaultreviewers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/default-reviewers/{target-username}
      name: repositories-workspace-repo-slug-default-reviewers-target-username
      description: REST surface for repositories-workspace-repo_slug-default-reviewers-target_username.
      operations:
      - method: PUT
        name: addusertothedefaultreviewers
        description: Atlassian Add User to the Default Reviewers
        call: bitbucket-repositories-reviewers.addusertothedefaultreviewers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/effective-default-reviewers
      name: repositories-workspace-repo-slug-effective-default-reviewers
      description: REST surface for repositories-workspace-repo_slug-effective-default-reviewers.
      operations:
      - method: GET
        name: listeffectivedefaultreviewers
        description: Atlassian List Effective Default Reviewers
        call: bitbucket-repositories-reviewers.listeffectivedefaultreviewers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-reviewers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Reviewers. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-list-default-reviewers
      description: Atlassian List Default Reviewers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-reviewers.listdefaultreviewers
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-add-user-default-reviewers
      description: Atlassian Add User to the Default Reviewers
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bitbucket-repositories-reviewers.addusertothedefaultreviewers
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-list-effective-default-reviewers
      description: Atlassian List Effective Default Reviewers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-reviewers.listeffectivedefaultreviewers
      outputParameters:
      - type: object
        mapping: $.
