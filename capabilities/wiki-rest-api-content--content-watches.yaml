      description: Atlassian Get Watches For Page
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wiki-rest-api-content--content-watches.atlassiangetwatchesforpage
      with:
        id: tools.id
        start: tools.start
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-watches-space
