naftiko: "1.0.0-alpha1"

info:
  label: "Atlassian Admin"
  description: "Atlassian Admin API for managing organizations, users, domains, groups, and policies."
  tags:
    - Administration
    - Cloud Admin
    - Organizations
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ATLASSIAN_API_TOKEN: ATLASSIAN_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: atlassian-admin
      baseUri: https://api.atlassian.com
      description: "Atlassian Admin API for organization management."
      authentication:
        type: bearer
        token: "{{ATLASSIAN_API_TOKEN}}"
      resources:
        - name: organizations
          path: /v1/orgs
          description: "Organization management"
          operations:
            - name: list-organizations
              method: GET
              description: "List accessible organizations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-organization
              method: GET
              description: "Get organization details"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: users
          path: /v1/orgs/{orgId}/users
          description: "User management within organization"
          operations:
            - name: list-users
              method: GET
              description: "List users in organization"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: domains
          path: /v1/orgs/{orgId}/domains
          description: "Domain management"
          operations:
            - name: list-domains
              method: GET
              description: "List domains in organization"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /v1/orgs/{orgId}/groups
          description: "Group management"
          operations:
            - name: list-groups
              method: GET
              description: "List groups in organization"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: policies
          path: /v1/orgs/{orgId}/policies
          description: "Policy management"
          operations:
            - name: list-policies
              method: GET
              description: "List organization policies"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: events
          path: /v1/orgs/{orgId}/events
          description: "Audit events"
          operations:
            - name: list-events
              method: GET
              description: "List organization audit events"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
