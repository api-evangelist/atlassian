naftiko: 1.0.0-alpha2
info:
  label: Atlassian The Jira Cloud platform REST API — Group and User Picker
  description: 'Atlassian The Jira Cloud platform REST API — Group and User Picker. 1 operations. Lead operation: Atlassian
    Find Users And Groups. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Group and User Picker
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: jira-group-and-user-picker
    baseUri: https://your-domain.atlassian.net
    description: Atlassian The Jira Cloud platform REST API — Group and User Picker business capability. Self-contained, no
      shared references.
    resources:
    - name: rest-api-3-groupuserpicker
      path: /rest/api/3/groupuserpicker
      operations:
      - name: atlassianfindusersandgroups
        method: GET
        description: Atlassian Find Users And Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: The search string.
          required: true
        - name: maxResults
          in: query
          type: integer
          description: The maximum number of items to return in each list.
        - name: showAvatar
          in: query
          type: boolean
          description: Whether the user avatar should be returned. If an invalid value is provided, the default value is used.
        - name: fieldId
          in: query
          type: string
          description: The custom field ID of the field this request is for.
        - name: projectId
          in: query
          type: array
          description: The ID of a project that returned users and groups must have permission to view. To include multiple
            projects, provide an ampersand-separated list. For example,
        - name: issueTypeId
          in: query
          type: array
          description: The ID of an issue type that returned users and groups must have permission to view. To include multiple
            issue types, provide an ampersand-separated list. For e
        - name: avatarSize
          in: query
          type: string
          description: The size of the avatar to return. If an invalid value is provided, the default value is used.
        - name: caseInsensitive
          in: query
          type: boolean
          description: Whether the search for groups should be case insensitive.
        - name: excludeConnectAddons
          in: query
          type: boolean
          description: Whether Connect app users and groups should be excluded from the search results. If an invalid value
            is provided, the default value is used.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: jira-group-and-user-picker-rest
    port: 8080
    description: REST adapter for Atlassian The Jira Cloud platform REST API — Group and User Picker. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/3/groupuserpicker
      name: rest-api-3-groupuserpicker
      description: REST surface for rest-api-3-groupuserpicker.
      operations:
      - method: GET
        name: atlassianfindusersandgroups
        description: Atlassian Find Users And Groups
        call: jira-group-and-user-picker.atlassianfindusersandgroups
        with:
          query: rest.query
          maxResults: rest.maxResults
          showAvatar: rest.showAvatar
          fieldId: rest.fieldId
          projectId: rest.projectId
          issueTypeId: rest.issueTypeId
          avatarSize: rest.avatarSize
          caseInsensitive: rest.caseInsensitive
          excludeConnectAddons: rest.excludeConnectAddons
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: jira-group-and-user-picker-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian The Jira Cloud platform REST API — Group and User Picker. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: atlassian-find-users-and-groups
      description: Atlassian Find Users And Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jira-group-and-user-picker.atlassianfindusersandgroups
      with:
        query: tools.query
        maxResults: tools.maxResults
        showAvatar: tools.showAvatar
        fieldId: tools.fieldId
        projectId: tools.projectId
        issueTypeId: tools.issueTypeId
        avatarSize: tools.avatarSize
        caseInsensitive: tools.caseInsensitive
        excludeConnectAddons: tools.excludeConnectAddons
      outputParameters:
      - type: object
        mapping: $.
