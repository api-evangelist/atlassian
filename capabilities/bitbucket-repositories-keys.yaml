        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesshkeypair
        method: DELETE
        description: Atlassian Delete Ssh Key Pair
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
