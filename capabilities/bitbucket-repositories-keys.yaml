      operations:
      - name: listrepositorydeploykeys
        method: GET
        description: Atlassian List Repository Deploy Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addrepositorydeploykey
        method: POST
        description: Atlassian Add Repository Deploy Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
