naftiko: 1.0.0-alpha2
info:
  label: Atlassian wiki/rest/api/space/ — Space Settings
  description: 'Atlassian wiki/rest/api/space/ — Space Settings. 2 operations. Lead operation: Atlassian Get Space Settings.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Space Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: wiki-rest-api-space--space-settings
    baseUri: ''
    description: Atlassian wiki/rest/api/space/ — Space Settings business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-space-spaceKey-settings
      path: /wiki/rest/api/space/{spaceKey}/settings
      operations:
      - name: atlassiangetspacesettings
        method: GET
        description: Atlassian Get Space Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: spaceKey
          in: path
          type: string
          description: The key of the space to be queried for its settings.
          required: true
      - name: atlassianupdatespacesettings
        method: PUT
        description: Atlassian Update Space Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: spaceKey
          in: path
          type: string
          description: The key of the space whose settings will be updated.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: wiki-rest-api-space--space-settings-rest
    port: 8080
    description: REST adapter for Atlassian wiki/rest/api/space/ — Space Settings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/space/{spacekey}/settings
      name: wiki-rest-api-space-spacekey-settings
      description: REST surface for wiki-rest-api-space-spaceKey-settings.
      operations:
      - method: GET
        name: atlassiangetspacesettings
        description: Atlassian Get Space Settings
        call: wiki-rest-api-space--space-settings.atlassiangetspacesettings
        with:
          spaceKey: rest.spaceKey
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: atlassianupdatespacesettings
        description: Atlassian Update Space Settings
        call: wiki-rest-api-space--space-settings.atlassianupdatespacesettings
        with:
          spaceKey: rest.spaceKey
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wiki-rest-api-space--space-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian wiki/rest/api/space/ — Space Settings. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-space-settings
      description: Atlassian Get Space Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wiki-rest-api-space--space-settings.atlassiangetspacesettings
      with:
        spaceKey: tools.spaceKey
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-update-space-settings
      description: Atlassian Update Space Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: wiki-rest-api-space--space-settings.atlassianupdatespacesettings
      with:
        spaceKey: tools.spaceKey
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
