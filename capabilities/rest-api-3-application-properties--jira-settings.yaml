naftiko: 1.0.0-alpha2
info:
  label: Atlassian rest/api/3/application-properties/ — Jira Settings
  description: 'Atlassian rest/api/3/application-properties/ — Jira Settings. 2 operations. Lead operation: Atlassian Get
    Advanced Settings. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Jira Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-api-3-application-properties--jira-settings
    baseUri: https://your-domain.atlassian.net
    description: Atlassian rest/api/3/application-properties/ — Jira Settings business capability. Self-contained, no shared
      references.
    resources:
    - name: rest-api-3-application-properties-advanced-settings
      path: /rest/api/3/application-properties/advanced-settings
      operations:
      - name: atlassiangetadvancedsettings
        method: GET
        description: Atlassian Get Advanced Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rest-api-3-application-properties-id
      path: /rest/api/3/application-properties/{id}
      operations:
      - name: atlassiansetapplicationproperty
        method: PUT
        description: Atlassian Set Application Property
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The key of the application property to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: rest-api-3-application-properties--jira-settings-rest
    port: 8080
    description: REST adapter for Atlassian rest/api/3/application-properties/ — Jira Settings. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/3/application-properties/advanced-settings
      name: rest-api-3-application-properties-advanced-settings
      description: REST surface for rest-api-3-application-properties-advanced-settings.
      operations:
      - method: GET
        name: atlassiangetadvancedsettings
        description: Atlassian Get Advanced Settings
        call: rest-api-3-application-properties--jira-settings.atlassiangetadvancedsettings
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/3/application-properties/{id}
      name: rest-api-3-application-properties-id
      description: REST surface for rest-api-3-application-properties-id.
      operations:
      - method: PUT
        name: atlassiansetapplicationproperty
        description: Atlassian Set Application Property
        call: rest-api-3-application-properties--jira-settings.atlassiansetapplicationproperty
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-api-3-application-properties--jira-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian rest/api/3/application-properties/ — Jira Settings. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: atlassian-get-advanced-settings
      description: Atlassian Get Advanced Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-api-3-application-properties--jira-settings.atlassiangetadvancedsettings
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-set-application-property
      description: Atlassian Set Application Property
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-api-3-application-properties--jira-settings.atlassiansetapplicationproperty
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
