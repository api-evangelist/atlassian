naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content API — Hierarchy
  description: 'Atlassian Confluence Content API — Hierarchy. 1 operations. Lead operation: Atlassian Copy Page Hierarchy.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Hierarchy
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-hierarchy
    baseUri: ''
    description: Atlassian Confluence Content API — Hierarchy business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-pagehierarchy-copy
      path: /wiki/rest/api/content/{id}/pagehierarchy/copy
      operations:
      - name: copypagehierarchy
        method: POST
        description: Atlassian Copy Page Hierarchy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-content-hierarchy-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content API — Hierarchy. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/pagehierarchy/copy
      name: wiki-rest-api-content-id-pagehierarchy-copy
      description: REST surface for wiki-rest-api-content-id-pagehierarchy-copy.
      operations:
      - method: POST
        name: copypagehierarchy
        description: Atlassian Copy Page Hierarchy
        call: confluence-content-hierarchy.copypagehierarchy
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-hierarchy-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content API — Hierarchy. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-copy-page-hierarchy
      description: Atlassian Copy Page Hierarchy
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: confluence-content-hierarchy.copypagehierarchy
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
