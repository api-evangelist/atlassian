        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
        - name: pullrequest_id
          in: path
          type: string
          description: The pull request ID.
          required: true
        - name: app_key
          in: path
          type: string
          description: The key of the Connect app.
          required: true
        - name: property_name
          in: path
          type: string
