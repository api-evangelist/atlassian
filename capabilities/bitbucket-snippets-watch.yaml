naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Snippets API — Watch
  description: 'Atlassian Bit Bucket Snippets API — Watch. 1 operations. Lead operation: Atlassian Watch Snippet. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Watch
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-snippets-watch
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Snippets API — Watch business capability. Self-contained, no shared references.
    resources:
    - name: snippets-workspace-encoded_id-watch
      path: /snippets/{workspace}/{encoded_id}/watch
      operations:
      - name: watchsnippet
        method: PUT
        description: Atlassian Watch Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bitbucket-snippets-watch-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Snippets API — Watch. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/snippets/{workspace}/{encoded-id}/watch
      name: snippets-workspace-encoded-id-watch
      description: REST surface for snippets-workspace-encoded_id-watch.
      operations:
      - method: PUT
        name: watchsnippet
        description: Atlassian Watch Snippet
        call: bitbucket-snippets-watch.watchsnippet
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-snippets-watch-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Snippets API — Watch. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-watch-snippet
      description: Atlassian Watch Snippet
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bitbucket-snippets-watch.watchsnippet
      outputParameters:
      - type: object
        mapping: $.
