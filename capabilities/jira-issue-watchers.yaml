naftiko: 1.0.0-alpha2
info:
  label: Atlassian The Jira Cloud platform REST API — Issue Watchers
  description: 'Atlassian The Jira Cloud platform REST API — Issue Watchers. 4 operations. Lead operation: Atlassian Get Is
