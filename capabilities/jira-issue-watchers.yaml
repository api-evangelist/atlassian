      description: REST surface for rest-api-3-issue-watching.
      operations:
      - method: POST
        name: atlassiangetiswatchingissuebulk
        description: Atlassian Get Is Watching Issue Bulk
        call: jira-issue-watchers.atlassiangetiswatchingissuebulk
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
