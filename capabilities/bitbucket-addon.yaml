naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bitbucket API — Addon
  description: 'Atlassian Bitbucket API — Addon. 10 operations. Lead operation: Atlassian Delete An App. Self-contained Naftiko
    capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Addon
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
