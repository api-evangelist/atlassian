  - type: http
    namespace: bitbucket-addon
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bitbucket API — Addon business capability. Self-contained, no shared references.
    resources:
    - name: addon
      path: /addon
      operations:
      - name: atlassiandeleteanapp
        method: DELETE
        description: Atlassian Delete An App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: atlassianupdateaninstalledapp
        method: PUT
        description: Atlassian Update An Installed App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: addon-linkers
      path: /addon/linkers
      operations:
      - name: atlassianlistlinkersforanapp
        method: GET
        description: Atlassian List Linkers For An App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
