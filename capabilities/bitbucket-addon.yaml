        outputParameters:
        - name: result
          type: object
          value: $.
      - name: atlassianlistlinkervaluesforalinker
        method: GET
        description: Atlassian List Linker Values For A Linker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: atlassiancreatealinkervalue
        method: POST
        description: Atlassian Create A Linker Value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: atlassianupdatealinkervalue
        method: PUT
        description: Atlassian Update A Linker Value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: addon-linkers-linker_key-values-value_id
      path: /addon/linkers/{linker_key}/values/{value_id}
      operations:
      - name: atlassiandeletealinkervalue
        method: DELETE
        description: Atlassian Delete A Linker Value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: atlassiangetalinkervalue
        method: GET
        description: Atlassian Get A Linker Value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
