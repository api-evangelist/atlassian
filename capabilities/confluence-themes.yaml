      call: confluence-themes.atlassiansetspacetheme
      with:
        spaceKey: tools.spaceKey
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-reset-space-theme
      description: Atlassian Reset Space Theme
      hints:
