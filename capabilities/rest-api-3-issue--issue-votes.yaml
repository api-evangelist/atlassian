naftiko: 1.0.0-alpha2
info:
  label: Atlassian rest/api/3/issue/ — Issue Votes
  description: 'Atlassian rest/api/3/issue/ — Issue Votes. 3 operations. Lead operation: Atlassian Delete Vote. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Issue Votes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-api-3-issue--issue-votes
    baseUri: https://your-domain.atlassian.net
    description: Atlassian rest/api/3/issue/ — Issue Votes business capability. Self-contained, no shared references.
    resources:
    - name: rest-api-3-issue-issueIdOrKey-votes
      path: /rest/api/3/issue/{issueIdOrKey}/votes
      operations:
      - name: atlassianremovevote
        method: DELETE
        description: Atlassian Delete Vote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: The ID or key of the issue.
          required: true
      - name: atlassiangetvotes
        method: GET
        description: Atlassian Get Votes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: The ID or key of the issue.
          required: true
      - name: atlassianaddvote
        method: POST
        description: Atlassian Add Vote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: The ID or key of the issue.
          required: true
  exposes:
  - type: rest
    namespace: rest-api-3-issue--issue-votes-rest
    port: 8080
    description: REST adapter for Atlassian rest/api/3/issue/ — Issue Votes. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/3/issue/{issueidorkey}/votes
      name: rest-api-3-issue-issueidorkey-votes
      description: REST surface for rest-api-3-issue-issueIdOrKey-votes.
      operations:
      - method: DELETE
        name: atlassianremovevote
        description: Atlassian Delete Vote
        call: rest-api-3-issue--issue-votes.atlassianremovevote
        with:
          issueIdOrKey: rest.issueIdOrKey
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: atlassiangetvotes
        description: Atlassian Get Votes
        call: rest-api-3-issue--issue-votes.atlassiangetvotes
        with:
          issueIdOrKey: rest.issueIdOrKey
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: atlassianaddvote
        description: Atlassian Add Vote
        call: rest-api-3-issue--issue-votes.atlassianaddvote
        with:
          issueIdOrKey: rest.issueIdOrKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-api-3-issue--issue-votes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian rest/api/3/issue/ — Issue Votes. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-delete-vote
      description: Atlassian Delete Vote
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-api-3-issue--issue-votes.atlassianremovevote
      with:
        issueIdOrKey: tools.issueIdOrKey
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-votes
      description: Atlassian Get Votes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-api-3-issue--issue-votes.atlassiangetvotes
      with:
        issueIdOrKey: tools.issueIdOrKey
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-add-vote
      description: Atlassian Add Vote
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-api-3-issue--issue-votes.atlassianaddvote
      with:
        issueIdOrKey: tools.issueIdOrKey
      outputParameters:
      - type: object
        mapping: $.
