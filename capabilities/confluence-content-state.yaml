naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content API — State
  description: 'Atlassian Confluence Content API — State. 3 operations. Lead operation: Atlassian Get Content State. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - State
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-state
    baseUri: ''
    description: Atlassian Confluence Content API — State business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-state
      path: /wiki/rest/api/content/{id}/state
      operations:
      - name: getcontentstate
        method: GET
        description: Atlassian Get Content State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the content whose content state is of interest.
          required: true
        - name: status
          in: query
          type: string
          description: Set status to one of [current,draft,archived]. Default value is current.
      - name: setthecontentstateofcontentandpublishesnewversionofthecontent
        method: PUT
        description: Atlassian Set the Content State of Content and Publishes New Version of the Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The Id of the content whose content state is to be set.
          required: true
        - name: status
          in: query
          type: string
          description: Status of content onto which state will be placed. If draft, then draft state will change.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removesthecontentstateofcontentandpublishesnewversion
        method: DELETE
        description: Atlassian Removes the Content State of Content and Publishes New Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The Id of the content whose content state is to be set.
          required: true
        - name: status
          in: query
          type: string
          description: status of content state from which to delete state. Can be draft or archived
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-content-state-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content API — State. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/state
      name: wiki-rest-api-content-id-state
      description: REST surface for wiki-rest-api-content-id-state.
      operations:
      - method: GET
        name: getcontentstate
        description: Atlassian Get Content State
        call: confluence-content-state.getcontentstate
        with:
          id: rest.id
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: setthecontentstateofcontentandpublishesnewversionofthecontent
        description: Atlassian Set the Content State of Content and Publishes New Version of the Content
        call: confluence-content-state.setthecontentstateofcontentandpublishesnewversionofthecontent
        with:
          id: rest.id
          status: rest.status
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removesthecontentstateofcontentandpublishesnewversion
        description: Atlassian Removes the Content State of Content and Publishes New Version
        call: confluence-content-state.removesthecontentstateofcontentandpublishesnewversion
        with:
          id: rest.id
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-state-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content API — State. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-get-content-state
      description: Atlassian Get Content State
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-content-state.getcontentstate
      with:
        id: tools.id
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-set-content-state-content
      description: Atlassian Set the Content State of Content and Publishes New Version of the Content
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: confluence-content-state.setthecontentstateofcontentandpublishesnewversionofthecontent
      with:
        id: tools.id
        status: tools.status
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-removes-content-state-content
      description: Atlassian Removes the Content State of Content and Publishes New Version
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: confluence-content-state.removesthecontentstateofcontentandpublishesnewversion
      with:
        id: tools.id
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
