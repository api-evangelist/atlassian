naftiko: 1.0.0-alpha2
info:
  label: Atlassian Admin API — Events
  description: 'Atlassian Admin API — Events. 2 operations. Lead operation: Atlassian Get Organization Events. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-events
    baseUri: https://api.atlassian.com
    description: Atlassian Admin API — Events business capability. Self-contained, no shared references.
    resources:
    - name: v1-orgs-orgId-events
      path: /v1/orgs/{orgId}/events
      operations:
      - name: getorganizationevents
        method: GET
        description: Atlassian Get Organization Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
          description: Cursor for paginated results.
        - name: from
          in: query
          type: string
          description: Filter events from this date-time (ISO 8601 format). Returns events that occurred on or after this
            time.
        - name: to
          in: query
          type: string
          description: Filter events up to this date-time (ISO 8601 format). Returns events that occurred on or before this
            time.
        - name: action
          in: query
          type: string
          description: Filter events by action type.
    - name: v1-orgs-orgId-events-eventId
      path: /v1/orgs/{orgId}/events/{eventId}
      operations:
      - name: geteventbyid
        method: GET
        description: Atlassian Get Event by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventId
          in: path
          type: string
          description: The unique identifier of the event.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-events-rest
    port: 8080
    description: REST adapter for Atlassian Admin API — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/orgs/{orgid}/events
      name: v1-orgs-orgid-events
      description: REST surface for v1-orgs-orgId-events.
      operations:
      - method: GET
        name: getorganizationevents
        description: Atlassian Get Organization Events
        call: admin-events.getorganizationevents
        with:
          cursor: rest.cursor
          from: rest.from
          to: rest.to
          action: rest.action
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/orgs/{orgid}/events/{eventid}
      name: v1-orgs-orgid-events-eventid
      description: REST surface for v1-orgs-orgId-events-eventId.
      operations:
      - method: GET
        name: geteventbyid
        description: Atlassian Get Event by Id
        call: admin-events.geteventbyid
        with:
          eventId: rest.eventId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Admin API — Events. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: atlassian-get-organization-events
      description: Atlassian Get Organization Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-events.getorganizationevents
      with:
        cursor: tools.cursor
        from: tools.from
        to: tools.to
        action: tools.action
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-event-id
      description: Atlassian Get Event by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-events.geteventbyid
      with:
        eventId: tools.eventId
      outputParameters:
      - type: object
        mapping: $.
