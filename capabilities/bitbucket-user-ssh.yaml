    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket User API — Ssh. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: atlassian-list-ssh-keys
      description: Atlassian List Ssh Keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-user-ssh.listsshkeys
      outputParameters:
      - type: object
        mapping: $.
