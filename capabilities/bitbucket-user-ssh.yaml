      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-user-ssh.deletesshkey
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-ssh-key
      description: Atlassian Get Ssh Key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-user-ssh.getsshkey
      outputParameters:
      - type: object
