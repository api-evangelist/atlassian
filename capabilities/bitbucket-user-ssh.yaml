naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket User API — Ssh
  description: 'Atlassian Bit Bucket User API — Ssh. 5 operations. Lead operation: Atlassian List Ssh Keys. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Ssh
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
