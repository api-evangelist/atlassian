    description: Atlassian Bit Bucket User API — Ssh business capability. Self-contained, no shared references.
    resources:
    - name: users-selected_user-ssh-keys
      path: /users/{selected_user}/ssh-keys
      operations:
      - name: listsshkeys
        method: GET
        description: Atlassian List Ssh Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addnewsshkey
        method: POST
        description: Atlassian Add New Ssh Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: users-selected_user-ssh-keys-key_id
      path: /users/{selected_user}/ssh-keys/{key_id}
      operations:
      - name: deletesshkey
        method: DELETE
        description: Atlassian Delete Ssh Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsshkey
