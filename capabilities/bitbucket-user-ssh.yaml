        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-user-ssh-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket User API — Ssh. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users/{selected-user}/ssh-keys
      name: users-selected-user-ssh-keys
      description: REST surface for users-selected_user-ssh-keys.
      operations:
      - method: GET
        name: listsshkeys
        description: Atlassian List Ssh Keys
        call: bitbucket-user-ssh.listsshkeys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addnewsshkey
        description: Atlassian Add New Ssh Key
        call: bitbucket-user-ssh.addnewsshkey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{selected-user}/ssh-keys/{key-id}
      name: users-selected-user-ssh-keys-key-id
      description: REST surface for users-selected_user-ssh-keys-key_id.
      operations:
      - method: DELETE
        name: deletesshkey
        description: Atlassian Delete Ssh Key
        call: bitbucket-user-ssh.deletesshkey
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getsshkey
        description: Atlassian Get Ssh Key
