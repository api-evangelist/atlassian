naftiko: 1.0.0-alpha2
info:
  label: Atlassian rest/api/3/jql/ — Issue Search
  description: 'Atlassian rest/api/3/jql/ — Issue Search. 1 operations. Lead operation: Atlassian Check Issues Against Jql.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Issue Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-api-3-jql--issue-search
    baseUri: https://your-domain.atlassian.net
    description: Atlassian rest/api/3/jql/ — Issue Search business capability. Self-contained, no shared references.
    resources:
    - name: rest-api-3-jql-match
      path: /rest/api/3/jql/match
      operations:
      - name: atlassianmatchissues
        method: POST
        description: Atlassian Check Issues Against Jql
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: rest-api-3-jql--issue-search-rest
    port: 8080
    description: REST adapter for Atlassian rest/api/3/jql/ — Issue Search. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/3/jql/match
      name: rest-api-3-jql-match
      description: REST surface for rest-api-3-jql-match.
      operations:
      - method: POST
        name: atlassianmatchissues
        description: Atlassian Check Issues Against Jql
        call: rest-api-3-jql--issue-search.atlassianmatchissues
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-api-3-jql--issue-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian rest/api/3/jql/ — Issue Search. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-check-issues-against-jql
      description: Atlassian Check Issues Against Jql
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: rest-api-3-jql--issue-search.atlassianmatchissues
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
