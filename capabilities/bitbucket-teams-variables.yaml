naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Teams API — Variables
  description: 'Atlassian Bit Bucket Teams API — Variables. 5 operations. Lead operation: Atlassian List Variables for an
    Account. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Variables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-teams-variables
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Teams API — Variables business capability. Self-contained, no shared references.
    resources:
    - name: teams-username-pipelines_config-variables
      path: /teams/{username}/pipelines_config/variables
      operations:
      - name: listvariablesforanaccount
        method: GET
        description: Atlassian List Variables for an Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The account.
          required: true
      - name: createvariableforuser
        method: POST
        description: Atlassian Create Variable for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The account.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: teams-username-pipelines_config-variables-variable_uuid
      path: /teams/{username}/pipelines_config/variables/{variable_uuid}
      operations:
      - name: getvariableforteam
        method: GET
        description: Atlassian Get Variable for Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The account.
          required: true
        - name: variable_uuid
          in: path
          type: string
          description: The UUID of the variable to retrieve.
          required: true
      - name: updatevariableforteam
        method: PUT
        description: Atlassian Update Variable for Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The account.
          required: true
        - name: variable_uuid
          in: path
          type: string
          description: The UUID of the variable.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletevariableforteam
        method: DELETE
        description: Atlassian Delete Variable for Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The account.
          required: true
        - name: variable_uuid
          in: path
          type: string
          description: The UUID of the variable to delete.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-teams-variables-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Teams API — Variables. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/teams/{username}/pipelines-config/variables
      name: teams-username-pipelines-config-variables
      description: REST surface for teams-username-pipelines_config-variables.
      operations:
      - method: GET
        name: listvariablesforanaccount
        description: Atlassian List Variables for an Account
        call: bitbucket-teams-variables.listvariablesforanaccount
        with:
          username: rest.username
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createvariableforuser
        description: Atlassian Create Variable for User
        call: bitbucket-teams-variables.createvariableforuser
        with:
          username: rest.username
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/{username}/pipelines-config/variables/{variable-uuid}
      name: teams-username-pipelines-config-variables-variable-uuid
      description: REST surface for teams-username-pipelines_config-variables-variable_uuid.
      operations:
      - method: GET
        name: getvariableforteam
        description: Atlassian Get Variable for Team
        call: bitbucket-teams-variables.getvariableforteam
        with:
          username: rest.username
          variable_uuid: rest.variable_uuid
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatevariableforteam
        description: Atlassian Update Variable for Team
        call: bitbucket-teams-variables.updatevariableforteam
        with:
          username: rest.username
          variable_uuid: rest.variable_uuid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletevariableforteam
        description: Atlassian Delete Variable for Team
        call: bitbucket-teams-variables.deletevariableforteam
        with:
          username: rest.username
          variable_uuid: rest.variable_uuid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-teams-variables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Teams API — Variables. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-list-variables-account
      description: Atlassian List Variables for an Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-teams-variables.listvariablesforanaccount
      with:
        username: tools.username
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-create-variable-user
      description: Atlassian Create Variable for User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-teams-variables.createvariableforuser
      with:
        username: tools.username
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-variable-team
      description: Atlassian Get Variable for Team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-teams-variables.getvariableforteam
      with:
        username: tools.username
        variable_uuid: tools.variable_uuid
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-update-variable-team
      description: Atlassian Update Variable for Team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bitbucket-teams-variables.updatevariableforteam
      with:
        username: tools.username
        variable_uuid: tools.variable_uuid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-delete-variable-team
      description: Atlassian Delete Variable for Team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-teams-variables.deletevariableforteam
      with:
        username: tools.username
        variable_uuid: tools.variable_uuid
      outputParameters:
      - type: object
        mapping: $.
