naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Snippets API — Stop
  description: 'Atlassian Bit Bucket Snippets API — Stop. 1 operations. Lead operation: Atlassian Stop Watching Snippet. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Stop
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-snippets-stop
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Snippets API — Stop business capability. Self-contained, no shared references.
    resources:
    - name: snippets-workspace-encoded_id-watch
      path: /snippets/{workspace}/{encoded_id}/watch
      operations:
      - name: stopwatchingsnippet
        method: DELETE
        description: Atlassian Stop Watching Snippet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bitbucket-snippets-stop-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Snippets API — Stop. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/snippets/{workspace}/{encoded-id}/watch
      name: snippets-workspace-encoded-id-watch
      description: REST surface for snippets-workspace-encoded_id-watch.
      operations:
      - method: DELETE
        name: stopwatchingsnippet
        description: Atlassian Stop Watching Snippet
        call: bitbucket-snippets-stop.stopwatchingsnippet
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-snippets-stop-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Snippets API — Stop. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-stop-watching-snippet
      description: Atlassian Stop Watching Snippet
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-snippets-stop.stopwatchingsnippet
      outputParameters:
      - type: object
        mapping: $.
