naftiko: 1.0.0-alpha2
info:
  label: Atlassian The Confluence Cloud REST API — Experimental
  description: 'Atlassian The Confluence Cloud REST API — Experimental. 4 operations. Lead operation: Atlassian Delete Page
    Tree. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Experimental
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-experimental
    baseUri: ''
    description: Atlassian The Confluence Cloud REST API — Experimental business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-pageTree
      path: /wiki/rest/api/content/{id}/pageTree
      operations:
      - name: atlassiandeletepagetree
        method: DELETE
        description: Atlassian Delete Page Tree
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the content which forms root of the page tree, to be deleted.
          required: true
    - name: wiki-rest-api-space-spaceKey-label
      path: /wiki/rest/api/space/{spaceKey}/label
      operations:
      - name: atlassiangetlabelsforspace
        method: GET
        description: Atlassian Get Space Labels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: spaceKey
          in: path
          type: string
          description: The key of the space to get labels for.
          required: true
        - name: prefix
          in: query
          type: string
          description: Filters the results to labels with the specified prefix. If this parameter
        - name: start
          in: query
          type: integer
          description: The starting index of the returned labels.
        - name: limit
          in: query
          type: integer
          description: The maximum number of labels to return per page. Note,
      - name: atlassianaddlabelstospace
        method: POST
        description: Atlassian Add Labels To A Space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: spaceKey
          in: path
          type: string
          description: The key of the space to add labels to.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: atlassiandeletelabelfromspace
        method: DELETE
        description: Atlassian Remove Label From A Space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: spaceKey
          in: path
          type: string
          description: The key of the space to remove a labels from.
          required: true
        - name: name
          in: query
          type: string
          description: The name of the label to remove
          required: true
        - name: prefix
          in: query
          type: string
          description: The prefix of the label to remove. If not provided defaults to global.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-experimental-rest
    port: 8080
    description: REST adapter for Atlassian The Confluence Cloud REST API — Experimental. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/pagetree
      name: wiki-rest-api-content-id-pagetree
      description: REST surface for wiki-rest-api-content-id-pageTree.
      operations:
      - method: DELETE
        name: atlassiandeletepagetree
        description: Atlassian Delete Page Tree
        call: confluence-experimental.atlassiandeletepagetree
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/wiki/rest/api/space/{spacekey}/label
      name: wiki-rest-api-space-spacekey-label
      description: REST surface for wiki-rest-api-space-spaceKey-label.
      operations:
      - method: GET
        name: atlassiangetlabelsforspace
        description: Atlassian Get Space Labels
        call: confluence-experimental.atlassiangetlabelsforspace
        with:
          spaceKey: rest.spaceKey
          prefix: rest.prefix
          start: rest.start
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: atlassianaddlabelstospace
        description: Atlassian Add Labels To A Space
        call: confluence-experimental.atlassianaddlabelstospace
        with:
          spaceKey: rest.spaceKey
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: atlassiandeletelabelfromspace
        description: Atlassian Remove Label From A Space
        call: confluence-experimental.atlassiandeletelabelfromspace
        with:
          spaceKey: rest.spaceKey
          name: rest.name
          prefix: rest.prefix
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-experimental-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian The Confluence Cloud REST API — Experimental. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: atlassian-delete-page-tree
      description: Atlassian Delete Page Tree
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: confluence-experimental.atlassiandeletepagetree
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-space-labels
      description: Atlassian Get Space Labels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-experimental.atlassiangetlabelsforspace
      with:
        spaceKey: tools.spaceKey
        prefix: tools.prefix
        start: tools.start
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-add-labels-space
      description: Atlassian Add Labels To A Space
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: confluence-experimental.atlassianaddlabelstospace
      with:
        spaceKey: tools.spaceKey
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-remove-label-space
      description: Atlassian Remove Label From A Space
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: confluence-experimental.atlassiandeletelabelfromspace
      with:
        spaceKey: tools.spaceKey
        name: tools.name
        prefix: tools.prefix
      outputParameters:
      - type: object
        mapping: $.
