naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Compare
  description: 'Atlassian Bit Bucket Repositories API — Compare. 2 operations. Lead operation: Atlassian Compare Two Commits.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Compare
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-compare
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Compare business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-diff-spec
      path: /repositories/{workspace}/{repo_slug}/diff/{spec}
      operations:
      - name: comparetwocommits
        method: GET
        description: Atlassian Compare Two Commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: context
          in: query
          type: integer
          description: Generate diffs with <n> lines of context instead of the usual three.
        - name: path
          in: query
          type: string
          description: Limit the diff to a particular file (this parameter
        - name: ignore_whitespace
          in: query
          type: boolean
          description: Generate diffs that ignore whitespace.
        - name: binary
          in: query
          type: boolean
          description: Generate diffs that include binary files, true if omitted.
        - name: renames
          in: query
          type: boolean
          description: Whether to perform rename detection, true if omitted.
        - name: merge
          in: query
          type: boolean
          description: This parameter is deprecated. The 'topic' parameter should be used
        - name: topic
          in: query
          type: boolean
          description: If true, returns 2-way 'three-dot' diff.
    - name: repositories-workspace-repo_slug-diffstat-spec
      path: /repositories/{workspace}/{repo_slug}/diffstat/{spec}
      operations:
      - name: comparetwocommitdiffstats
        method: GET
        description: Atlassian Compare Two Commit Diff Stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-compare-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Compare. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/diff/{spec}
      name: repositories-workspace-repo-slug-diff-spec
      description: REST surface for repositories-workspace-repo_slug-diff-spec.
      operations:
      - method: GET
        name: comparetwocommits
        description: Atlassian Compare Two Commits
        call: bitbucket-repositories-compare.comparetwocommits
        with:
          context: rest.context
          path: rest.path
          ignore_whitespace: rest.ignore_whitespace
          binary: rest.binary
          renames: rest.renames
          merge: rest.merge
          topic: rest.topic
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/diffstat/{spec}
      name: repositories-workspace-repo-slug-diffstat-spec
      description: REST surface for repositories-workspace-repo_slug-diffstat-spec.
      operations:
      - method: GET
        name: comparetwocommitdiffstats
        description: Atlassian Compare Two Commit Diff Stats
        call: bitbucket-repositories-compare.comparetwocommitdiffstats
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-compare-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Compare. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-compare-two-commits
      description: Atlassian Compare Two Commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-compare.comparetwocommits
      with:
        context: tools.context
        path: tools.path
        ignore_whitespace: tools.ignore_whitespace
        binary: tools.binary
        renames: tools.renames
        merge: tools.merge
        topic: tools.topic
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-compare-two-commit-diff
      description: Atlassian Compare Two Commit Diff Stats
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-compare.comparetwocommitdiffstats
      outputParameters:
      - type: object
        mapping: $.
