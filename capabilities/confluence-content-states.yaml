naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content API — States
  description: 'Atlassian Confluence Content API — States. 1 operations. Lead operation: Atlassian Gets Available Content
    States for Content. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - States
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-states
    baseUri: ''
    description: Atlassian Confluence Content API — States business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-state-available
      path: /wiki/rest/api/content/{id}/state/available
      operations:
      - name: getsavailablecontentstatesforcontent
        method: GET
        description: Atlassian Gets Available Content States for Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: id of content to get available states for
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-content-states-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content API — States. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/state/available
      name: wiki-rest-api-content-id-state-available
      description: REST surface for wiki-rest-api-content-id-state-available.
      operations:
      - method: GET
        name: getsavailablecontentstatesforcontent
        description: Atlassian Gets Available Content States for Content
        call: confluence-content-states.getsavailablecontentstatesforcontent
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-states-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content API — States. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-gets-available-content-states
      description: Atlassian Gets Available Content States for Content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-content-states.getsavailablecontentstatesforcontent
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
