naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Workspaces API — Code
  description: 'Atlassian Bit Bucket Workspaces API — Code. 1 operations. Lead operation: Atlassian Search For Code In A Workspace.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Code
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-api-3-announcementbanner--code
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Workspaces API — Code business capability. Self-contained, no shared references.
    resources:
    - name: workspaces-workspace-search-code
      path: /workspaces/{workspace}/search/code
      operations:
      - name: atlassiansearchworkspace
        method: GET
        description: Atlassian Search For Code In A Workspace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: The workspace to search in; either the slug or the UUID in curly braces
          required: true
        - name: search_query
          in: query
          type: string
          description: The search query
          required: true
        - name: page
          in: query
          type: integer
          description: Which page of the search results to retrieve
        - name: pagelen
          in: query
          type: integer
          description: How many search results to retrieve per page
  exposes:
  - type: rest
    namespace: rest-api-3-announcementbanner--code-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Workspaces API — Code. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/workspaces/{workspace}/search/code
      name: workspaces-workspace-search-code
      description: REST surface for workspaces-workspace-search-code.
      operations:
      - method: GET
        name: atlassiansearchworkspace
        description: Atlassian Search For Code In A Workspace
        call: rest-api-3-announcementbanner--code.atlassiansearchworkspace
        with:
          workspace: rest.workspace
          search_query: rest.search_query
          page: rest.page
          pagelen: rest.pagelen
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-api-3-announcementbanner--code-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Workspaces API — Code. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-search-code-workspace
      description: Atlassian Search For Code In A Workspace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-api-3-announcementbanner--code.atlassiansearchworkspace
      with:
        workspace: tools.workspace
        search_query: tools.search_query
        page: tools.page
        pagelen: tools.pagelen
      outputParameters:
      - type: object
        mapping: $.
