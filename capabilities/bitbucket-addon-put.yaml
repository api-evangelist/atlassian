naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Addon API — Put
  description: 'Atlassian Bit Bucket Addon API — Put. 1 operations. Lead operation: Atlassian Put Addon Linkers Key Values.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Put
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-addon-put
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Addon API — Put business capability. Self-contained, no shared references.
    resources:
    - name: addon-linkers-linker_key-values
      path: /addon/linkers/{linker_key}/values
      operations:
      - name: putaddonlinkerslinkerkeyvalues
        method: PUT
        description: Atlassian Put Addon Linkers Key Values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bitbucket-addon-put-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Addon API — Put. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/addon/linkers/{linker-key}/values
      name: addon-linkers-linker-key-values
      description: REST surface for addon-linkers-linker_key-values.
      operations:
      - method: PUT
        name: putaddonlinkerslinkerkeyvalues
        description: Atlassian Put Addon Linkers Key Values
        call: bitbucket-addon-put.putaddonlinkerslinkerkeyvalues
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-addon-put-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Addon API — Put. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: atlassian-put-addon-linkers-key
      description: Atlassian Put Addon Linkers Key Values
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bitbucket-addon-put.putaddonlinkerslinkerkeyvalues
      outputParameters:
      - type: object
        mapping: $.
