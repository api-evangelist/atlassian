naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Executions
  description: 'Atlassian Bit Bucket Repositories API — Executions. 1 operations. Lead operation: Atlassian List Executions
    of Schedule. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Executions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-executions
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Executions business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-pipelines_config-schedules-schedule_uuid-execut
      path: /repositories/{workspace}/{repo_slug}/pipelines_config/schedules/{schedule_uuid}/executions
      operations:
      - name: listexecutionsofschedule
        method: GET
        description: Atlassian List Executions of Schedule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: This can either be the workspace ID (slug) or the workspace UUID surrounded by curly-braces, for example
            `{workspace UUID}`.
          required: true
        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
        - name: schedule_uuid
          in: path
          type: string
          description: The uuid of the schedule.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-executions-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Executions. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/pipelines-config/schedules/{schedule-uuid}/executions
      name: repositories-workspace-repo-slug-pipelines-config-schedules-schedule-uuid-execut
      description: REST surface for repositories-workspace-repo_slug-pipelines_config-schedules-schedule_uuid-execut.
      operations:
      - method: GET
        name: listexecutionsofschedule
        description: Atlassian List Executions of Schedule
        call: bitbucket-repositories-executions.listexecutionsofschedule
        with:
          workspace: rest.workspace
          repo_slug: rest.repo_slug
          schedule_uuid: rest.schedule_uuid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-executions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Executions. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-list-executions-schedule
      description: Atlassian List Executions of Schedule
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-executions.listexecutionsofschedule
      with:
        workspace: tools.workspace
        repo_slug: tools.repo_slug
        schedule_uuid: tools.schedule_uuid
      outputParameters:
      - type: object
        mapping: $.
