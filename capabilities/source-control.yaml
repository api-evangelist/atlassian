naftiko: 1.0.0-alpha2
info:
  label: Atlassian Source Control
  description: Source control workflow combining Bitbucket Repositories, Pull Requests, Workspaces, Snippets, and Teams APIs
    for developers to manage code, reviews, and collaboration.
  tags:
  - Atlassian
  - Bitbucket
  - Source Control
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_TOKEN: ATLASSIAN_API_TOKEN
    ATLASSIAN_EMAIL: ATLASSIAN_EMAIL
capability:
  consumes:
  - type: http
    namespace: atlassian-admin
    baseUri: https://api.atlassian.com
    description: Atlassian Admin API for organization management.
    authentication:
      type: bearer
      token: '{{ATLASSIAN_API_TOKEN}}'
    resources:
    - name: organizations
      path: /v1/orgs
      description: Organization management
      operations:
      - name: list-organizations
        method: GET
        description: List accessible organizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-organization
        method: GET
        description: Get organization details
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /v1/orgs/{orgId}/users
      description: User management within organization
      operations:
      - name: list-users
        method: GET
        description: List users in organization
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: domains
      path: /v1/orgs/{orgId}/domains
      description: Domain management
      operations:
      - name: list-domains
        method: GET
        description: List domains in organization
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groups
      path: /v1/orgs/{orgId}/groups
      description: Group management
      operations:
      - name: list-groups
        method: GET
        description: List groups in organization
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: policies
      path: /v1/orgs/{orgId}/policies
      description: Policy management
      operations:
      - name: list-policies
        method: GET
        description: List organization policies
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: events
      path: /v1/orgs/{orgId}/events
      description: Audit events
      operations:
      - name: list-events
        method: GET
        description: List organization audit events
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: atlassian-source-control-api
    description: Unified REST API for Bitbucket source control operations.
    resources:
    - path: /v1/repositories
      name: repositories
      description: Repository management
      operations:
      - method: GET
        name: list-repositories
        description: List repositories in a workspace
        call: atlassian-admin.list-organizations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pull-requests
      name: pull-requests
      description: Pull request management
      operations:
      - method: GET
        name: list-pull-requests
        description: List pull requests
        call: atlassian-admin.list-organizations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workspaces
      name: workspaces
      description: Workspace management
      operations:
      - method: GET
        name: list-workspaces
        description: List workspaces
        call: atlassian-admin.list-organizations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: atlassian-source-control-mcp
    transport: http
    description: MCP server for AI-assisted Bitbucket source control.
    tools:
    - name: list-repositories
      description: List Bitbucket repositories in a workspace
      hints:
        readOnly: true
        openWorld: true
      call: atlassian-admin.list-organizations
      outputParameters:
      - type: object
        mapping: $.
    - name: list-pull-requests
      description: List pull requests for a repository
      hints:
        readOnly: true
      call: atlassian-admin.list-organizations
      outputParameters:
      - type: object
        mapping: $.
    - name: list-workspaces
      description: List Bitbucket workspaces
      hints:
        readOnly: true
      call: atlassian-admin.list-organizations
      outputParameters:
      - type: object
        mapping: $.
    - name: list-snippets
      description: List code snippets
      hints:
        readOnly: true
      call: atlassian-admin.list-organizations
      outputParameters:
      - type: object
        mapping: $.
    - name: list-teams
      description: List teams in a workspace
      hints:
        readOnly: true
      call: atlassian-admin.list-organizations
      outputParameters:
      - type: object
        mapping: $.
