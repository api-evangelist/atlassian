naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content API — Single
  description: 'Atlassian Confluence Content API — Single. 1 operations. Lead operation: Atlassian Copy Single Page. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Single
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-single
    baseUri: ''
    description: Atlassian Confluence Content API — Single business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-copy
      path: /wiki/rest/api/content/{id}/copy
      operations:
      - name: copysinglepage
        method: POST
        description: Atlassian Copy Single Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-content-single-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content API — Single. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/copy
      name: wiki-rest-api-content-id-copy
      description: REST surface for wiki-rest-api-content-id-copy.
      operations:
      - method: POST
        name: copysinglepage
        description: Atlassian Copy Single Page
        call: confluence-content-single.copysinglepage
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-single-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content API — Single. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-copy-single-page
      description: Atlassian Copy Single Page
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: confluence-content-single.copysinglepage
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
