naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content API — Search
  description: 'Atlassian Confluence Content API — Search. 1 operations. Lead operation: Atlassian Search Content by Cql.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-search
    baseUri: ''
    description: Atlassian Confluence Content API — Search business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-search
      path: /wiki/rest/api/content/search
      operations:
      - name: searchcontentbycql
        method: GET
        description: Atlassian Search Content by Cql
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cql
          in: query
          type: string
          description: The CQL string that is used to find the requested content.
          required: true
        - name: cqlcontext
          in: query
          type: string
          description: The space, content, and content status to execute the search against.
        - name: cursor
          in: query
          type: string
          description: Pointer to a set of search results, returned as part of the `next` or `prev` URL from the previous
            search call.
        - name: limit
          in: query
          type: integer
          description: The maximum number of content objects to return per page.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-content-search-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content API — Search. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/search
      name: wiki-rest-api-content-search
      description: REST surface for wiki-rest-api-content-search.
      operations:
      - method: GET
        name: searchcontentbycql
        description: Atlassian Search Content by Cql
        call: confluence-content-search.searchcontentbycql
        with:
          cql: rest.cql
          cqlcontext: rest.cqlcontext
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content API — Search. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-search-content-cql
      description: Atlassian Search Content by Cql
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-content-search.searchcontentbycql
      with:
        cql: tools.cql
        cqlcontext: tools.cqlcontext
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
