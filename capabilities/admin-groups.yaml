naftiko: 1.0.0-alpha2
info:
  label: Atlassian Admin API — Groups
  description: 'Atlassian Admin API — Groups. 1 operations. Lead operation: Atlassian Get Organization Groups. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-groups
    baseUri: https://api.atlassian.com
    description: Atlassian Admin API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: v1-orgs-orgId-groups
      path: /v1/orgs/{orgId}/groups
      operations:
      - name: getorganizationgroups
        method: GET
        description: Atlassian Get Organization Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
          description: Cursor for paginated results.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-groups-rest
    port: 8080
    description: REST adapter for Atlassian Admin API — Groups. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/orgs/{orgid}/groups
      name: v1-orgs-orgid-groups
      description: REST surface for v1-orgs-orgId-groups.
      operations:
      - method: GET
        name: getorganizationgroups
        description: Atlassian Get Organization Groups
        call: admin-groups.getorganizationgroups
        with:
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Admin API — Groups. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: atlassian-get-organization-groups
      description: Atlassian Get Organization Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-groups.getorganizationgroups
      with:
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
