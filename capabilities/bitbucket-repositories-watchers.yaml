naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Watchers
  description: 'Atlassian Bit Bucket Repositories API — Watchers. 1 operations. Lead operation: Atlassian List Repositories
    Watchers. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Watchers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-watchers
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Watchers business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-watchers
      path: /repositories/{workspace}/{repo_slug}/watchers
      operations:
      - name: listrepositorieswatchers
        method: GET
        description: Atlassian List Repositories Watchers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-watchers-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Watchers. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/watchers
      name: repositories-workspace-repo-slug-watchers
      description: REST surface for repositories-workspace-repo_slug-watchers.
      operations:
      - method: GET
        name: listrepositorieswatchers
        description: Atlassian List Repositories Watchers
        call: bitbucket-repositories-watchers.listrepositorieswatchers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-watchers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Watchers. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-list-repositories-watchers
      description: Atlassian List Repositories Watchers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-watchers.listrepositorieswatchers
      outputParameters:
      - type: object
        mapping: $.
