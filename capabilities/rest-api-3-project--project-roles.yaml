naftiko: 1.0.0-alpha2
info:
  label: Atlassian rest/api/3/project/ — Project Roles
  description: 'Atlassian rest/api/3/project/ — Project Roles. 3 operations. Lead operation: Atlassian Get Project Roles For
    Project. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Project Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
