        description: Atlassian Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-selected_user-pipelines_config-variables-variable_uuid
      path: /users/{selected_user}/pipelines_config/variables/{variable_uuid}
      operations:
      - name: getvariableforuser
        method: GET
        description: Atlassian Get Variable for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: selected_user
          in: path
          type: string
          description: Either the UUID of the account surrounded by curly-braces, for example `{account UUID}`, OR an Atlassian
            Account ID.
          required: true
        - name: variable_uuid
          in: path
          type: string
          description: The UUID of the variable to retrieve.
          required: true
    - name: users-selected_user-properties-app_key-property_name
      path: /users/{selected_user}/properties/{app_key}/{property_name}
      operations:
      - name: getuserapplicationproperty
        method: GET
        description: Atlassian Get User Application Property
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
