            Account ID.
          required: true
        - name: app_key
          in: path
          type: string
          description: The key of the Connect app.
          required: true
        - name: property_name
          in: path
          type: string
          description: The name of the property.
          required: true
    - name: users-selected_user-ssh-keys-key_id
      path: /users/{selected_user}/ssh-keys/{key_id}
      operations:
      - name: getsshkey
        method: GET
        description: Atlassian Get Ssh Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
