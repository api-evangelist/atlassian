      path: /repositories/{workspace}/{repo_slug}/permissions-config/users/{selected_user_id}
      operations:
      - name: getanexplicituserpermissionforrepository
        method: GET
        description: Atlassian Get an Explicit User Permission for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user
      path: /user
      operations:
      - name: getcurrentuser
        method: GET
        description: Atlassian Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
