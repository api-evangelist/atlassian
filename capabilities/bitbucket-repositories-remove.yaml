naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Remove
  description: 'Atlassian Bit Bucket Repositories API — Remove. 2 operations. Lead operation: Atlassian Remove Vote for an
    Issue. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-remove
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Remove business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-issues-issue_id-vote
      path: /repositories/{workspace}/{repo_slug}/issues/{issue_id}/vote
      operations:
      - name: removevoteforanissue
        method: DELETE
        description: Atlassian Remove Vote for an Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-workspace-repo_slug-pullrequests-pull_request_id-request-changes
      path: /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/request-changes
      operations:
      - name: removechangerequestforpullrequest
        method: DELETE
        description: Atlassian Remove Change Request for Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-remove-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Remove. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/issues/{issue-id}/vote
      name: repositories-workspace-repo-slug-issues-issue-id-vote
      description: REST surface for repositories-workspace-repo_slug-issues-issue_id-vote.
      operations:
      - method: DELETE
        name: removevoteforanissue
        description: Atlassian Remove Vote for an Issue
        call: bitbucket-repositories-remove.removevoteforanissue
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/pullrequests/{pull-request-id}/request-changes
      name: repositories-workspace-repo-slug-pullrequests-pull-request-id-request-changes
      description: REST surface for repositories-workspace-repo_slug-pullrequests-pull_request_id-request-changes.
      operations:
      - method: DELETE
        name: removechangerequestforpullrequest
        description: Atlassian Remove Change Request for Pull Request
        call: bitbucket-repositories-remove.removechangerequestforpullrequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Remove. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-remove-vote-issue
      description: Atlassian Remove Vote for an Issue
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-repositories-remove.removevoteforanissue
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-remove-change-request-pull
      description: Atlassian Remove Change Request for Pull Request
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bitbucket-repositories-remove.removechangerequestforpullrequest
      outputParameters:
      - type: object
        mapping: $.
