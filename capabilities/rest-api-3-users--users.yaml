  tags:
  - Atlassian
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-api-3-users--users
    baseUri: https://your-domain.atlassian.net
    description: Atlassian rest/api/3/users/ — Users business capability. Self-contained, no shared references.
    resources:
    - name: rest-api-3-users-search
      path: /rest/api/3/users/search
      operations:
      - name: atlassiangetallusers
        method: GET
        description: Atlassian Get All Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startAt
          in: query
          type: integer
          description: The index of the first item to return.
        - name: maxResults
          in: query
          type: integer
          description: The maximum number of items to return.
  exposes:
  - type: rest
