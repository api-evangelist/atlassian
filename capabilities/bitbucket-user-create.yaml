naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket User API — Create
  description: 'Atlassian Bit Bucket User API — Create. 1 operations. Lead operation: Atlassian Create Variable for User.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-user-create
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket User API — Create business capability. Self-contained, no shared references.
    resources:
    - name: users-selected_user-pipelines_config-variables
      path: /users/{selected_user}/pipelines_config/variables
      operations:
      - name: createvariableforuser
        method: POST
        description: Atlassian Create Variable for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: selected_user
          in: path
          type: string
          description: Either the UUID of the account surrounded by curly-braces, for example `{account UUID}`, OR an Atlassian
            Account ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-user-create-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket User API — Create. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users/{selected-user}/pipelines-config/variables
      name: users-selected-user-pipelines-config-variables
      description: REST surface for users-selected_user-pipelines_config-variables.
      operations:
      - method: POST
        name: createvariableforuser
        description: Atlassian Create Variable for User
        call: bitbucket-user-create.createvariableforuser
        with:
          selected_user: rest.selected_user
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-user-create-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket User API — Create. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: atlassian-create-variable-user
      description: Atlassian Create Variable for User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-user-create.createvariableforuser
      with:
        selected_user: tools.selected_user
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
