naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Import
  description: 'Atlassian Bit Bucket Repositories API — Import. 2 operations. Lead operation: Atlassian Check Issue Import
    Status. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Import
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-import
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Import business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-issues-import
      path: /repositories/{workspace}/{repo_slug}/issues/import
      operations:
      - name: checkissueimportstatus
        method: GET
        description: Atlassian Check Issue Import Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: importissues
        method: POST
        description: Atlassian Import Issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-import-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Import. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/issues/import
      name: repositories-workspace-repo-slug-issues-import
      description: REST surface for repositories-workspace-repo_slug-issues-import.
      operations:
      - method: GET
        name: checkissueimportstatus
        description: Atlassian Check Issue Import Status
        call: bitbucket-repositories-import.checkissueimportstatus
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: importissues
        description: Atlassian Import Issues
        call: bitbucket-repositories-import.importissues
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-import-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Import. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-check-issue-import-status
      description: Atlassian Check Issue Import Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-import.checkissueimportstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-import-issues
      description: Atlassian Import Issues
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-repositories-import.importissues
      outputParameters:
      - type: object
        mapping: $.
