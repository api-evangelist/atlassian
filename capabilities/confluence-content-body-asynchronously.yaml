naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content Body API — Asynchronously
  description: 'Atlassian Confluence Content Body API — Asynchronously. 2 operations. Lead operation: Atlassian Get Asynchronously
    Converted Content Body From the Id or the Current Status of the Task. Self-contained Naftiko capability covering one Atlassian
    business surface.'
  tags:
  - Atlassian
  - Asynchronously
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-body-asynchronously
    baseUri: ''
    description: Atlassian Confluence Content Body API — Asynchronously business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-contentbody-convert-async-id
      path: /wiki/rest/api/contentbody/convert/async/{id}
      operations:
      - name: getasynchronouslyconvertedcontentbodyfromtheidorthecurrentstatusofthetask
        method: GET
        description: Atlassian Get Asynchronously Converted Content Body From the Id or the Current Status of the Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The asyncId of the macro task to get the converted body.
          required: true
    - name: wiki-rest-api-contentbody-convert-async-to
      path: /wiki/rest/api/contentbody/convert/async/{to}
      operations:
      - name: asynchronouslyconvertcontentbody
        method: POST
        description: Atlassian Asynchronously Convert Content Body
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: to
          in: path
          type: string
          description: The name of the target format for the content body.
          required: true
        - name: spaceKeyContext
          in: query
          type: string
          description: The space key used for resolving embedded content (page includes,
        - name: contentIdContext
          in: query
          type: string
          description: The content ID used to find the space for resolving embedded content
        - name: allowCache
          in: query
          type: boolean
          description: If this field is false, the cache will erase its current value and begin a new conversion.
        - name: embeddedContentRender
          in: query
          type: string
          description: Mode used for rendering embedded content, like attachments.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: confluence-content-body-asynchronously-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content Body API — Asynchronously. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/contentbody/convert/async/{id}
      name: wiki-rest-api-contentbody-convert-async-id
      description: REST surface for wiki-rest-api-contentbody-convert-async-id.
      operations:
      - method: GET
        name: getasynchronouslyconvertedcontentbodyfromtheidorthecurrentstatusofthetask
        description: Atlassian Get Asynchronously Converted Content Body From the Id or the Current Status of the Task
        call: confluence-content-body-asynchronously.getasynchronouslyconvertedcontentbodyfromtheidorthecurrentstatusofthetask
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/wiki/rest/api/contentbody/convert/async/{to}
      name: wiki-rest-api-contentbody-convert-async-to
      description: REST surface for wiki-rest-api-contentbody-convert-async-to.
      operations:
      - method: POST
        name: asynchronouslyconvertcontentbody
        description: Atlassian Asynchronously Convert Content Body
        call: confluence-content-body-asynchronously.asynchronouslyconvertcontentbody
        with:
          to: rest.to
          spaceKeyContext: rest.spaceKeyContext
          contentIdContext: rest.contentIdContext
          allowCache: rest.allowCache
          embeddedContentRender: rest.embeddedContentRender
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-body-asynchronously-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content Body API — Asynchronously. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: atlassian-get-asynchronously-converted-content
      description: Atlassian Get Asynchronously Converted Content Body From the Id or the Current Status of the Task
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-content-body-asynchronously.getasynchronouslyconvertedcontentbodyfromtheidorthecurrentstatusofthetask
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-asynchronously-convert-content-body
      description: Atlassian Asynchronously Convert Content Body
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: confluence-content-body-asynchronously.asynchronouslyconvertcontentbody
      with:
        to: tools.to
        spaceKeyContext: tools.spaceKeyContext
        contentIdContext: tools.contentIdContext
        allowCache: tools.allowCache
        embeddedContentRender: tools.embeddedContentRender
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
