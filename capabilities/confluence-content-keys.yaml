naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content API — Keys
  description: 'Atlassian Confluence Content API — Keys. 1 operations. Lead operation: Atlassian Create Content Property for
    Key. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-keys
    baseUri: ''
    description: Atlassian Confluence Content API — Keys business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-property-key
      path: /wiki/rest/api/content/{id}/property/{key}
      operations:
      - name: createcontentpropertyforkey
        method: POST
        description: Atlassian Create Content Property for Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the content to add the property to.
          required: true
        - name: key
          in: path
          type: string
          description: The key of the content property. Required.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-content-keys-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content API — Keys. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/property/{key}
      name: wiki-rest-api-content-id-property-key
      description: REST surface for wiki-rest-api-content-id-property-key.
      operations:
      - method: POST
        name: createcontentpropertyforkey
        description: Atlassian Create Content Property for Key
        call: confluence-content-keys.createcontentpropertyforkey
        with:
          id: rest.id
          key: rest.key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content API — Keys. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: atlassian-create-content-property-key
      description: Atlassian Create Content Property for Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: confluence-content-keys.createcontentpropertyforkey
      with:
        id: tools.id
        key: tools.key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
