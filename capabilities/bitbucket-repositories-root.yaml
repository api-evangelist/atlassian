naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Root
  description: 'Atlassian Bit Bucket Repositories API — Root. 1 operations. Lead operation: Atlassian Get the Root Directory
    of the Main Branch. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Root
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-root
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Root business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-src
      path: /repositories/{workspace}/{repo_slug}/src
      operations:
      - name: gettherootdirectoryofthemainbranch
        method: GET
        description: Atlassian Get the Root Directory of the Main Branch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
          description: Instead of returning the file's contents, return the (json) meta data for it.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-root-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Root. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/src
      name: repositories-workspace-repo-slug-src
      description: REST surface for repositories-workspace-repo_slug-src.
      operations:
      - method: GET
        name: gettherootdirectoryofthemainbranch
        description: Atlassian Get the Root Directory of the Main Branch
        call: bitbucket-repositories-root.gettherootdirectoryofthemainbranch
        with:
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-root-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Root. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-get-root-directory-main
      description: Atlassian Get the Root Directory of the Main Branch
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-root.gettherootdirectoryofthemainbranch
      with:
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
