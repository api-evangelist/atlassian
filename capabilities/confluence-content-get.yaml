        name: getcontentbyid
        description: Atlassian Get Content by Id
        call: confluence-content-get.getcontentbyid
        with:
          id: rest.id
          status: rest.status
          version: rest.version
          embeddedContentRender: rest.embeddedContentRender
          trigger: rest.trigger
        outputParameters:
        - type: object
          mapping: $.
