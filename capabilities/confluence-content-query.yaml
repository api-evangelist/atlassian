naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content API — Query
  description: 'Atlassian Confluence Content API — Query. 1 operations. Lead operation: Atlassian Remove Label From Content
    Using Query Parameter. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Query
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-query
    baseUri: ''
    description: Atlassian Confluence Content API — Query business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-label
      path: /wiki/rest/api/content/{id}/label
      operations:
      - name: removelabelfromcontentusingqueryparameter
        method: DELETE
        description: Atlassian Remove Label From Content Using Query Parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the content that the label will be removed from.
          required: true
        - name: name
          in: query
          type: string
          description: The name of the label to be removed.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-content-query-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content API — Query. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/label
      name: wiki-rest-api-content-id-label
      description: REST surface for wiki-rest-api-content-id-label.
      operations:
      - method: DELETE
        name: removelabelfromcontentusingqueryparameter
        description: Atlassian Remove Label From Content Using Query Parameter
        call: confluence-content-query.removelabelfromcontentusingqueryparameter
        with:
          id: rest.id
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-query-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content API — Query. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-remove-label-content-using
      description: Atlassian Remove Label From Content Using Query Parameter
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: confluence-content-query.removelabelfromcontentusingqueryparameter
      with:
        id: tools.id
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
