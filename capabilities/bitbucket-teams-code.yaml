naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Teams API — Code
  description: 'Atlassian Bit Bucket Teams API — Code. 1 operations. Lead operation: Atlassian Search for Code in Teams Repositories.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Code
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-teams-code
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Teams API — Code business capability. Self-contained, no shared references.
    resources:
    - name: teams-username-search-code
      path: /teams/{username}/search/code
      operations:
      - name: searchforcodeinteamsrepositories
        method: GET
        description: Atlassian Search for Code in Teams Repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The account to search in; either the username or the UUID in curly braces
          required: true
        - name: search_query
          in: query
          type: string
          description: The search query
          required: true
        - name: page
          in: query
          type: integer
          description: Which page of the search results to retrieve
        - name: pagelen
          in: query
          type: integer
          description: How many search results to retrieve per page
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-teams-code-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Teams API — Code. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/teams/{username}/search/code
      name: teams-username-search-code
      description: REST surface for teams-username-search-code.
      operations:
      - method: GET
        name: searchforcodeinteamsrepositories
        description: Atlassian Search for Code in Teams Repositories
        call: bitbucket-teams-code.searchforcodeinteamsrepositories
        with:
          username: rest.username
          search_query: rest.search_query
          page: rest.page
          pagelen: rest.pagelen
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-teams-code-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Teams API — Code. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: atlassian-search-code-teams-repositories
      description: Atlassian Search for Code in Teams Repositories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-teams-code.searchforcodeinteamsrepositories
      with:
        username: tools.username
        search_query: tools.search_query
        page: tools.page
        pagelen: tools.pagelen
      outputParameters:
      - type: object
        mapping: $.
