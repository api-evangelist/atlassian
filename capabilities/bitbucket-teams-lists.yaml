naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Teams API — Lists
  description: 'Atlassian Bit Bucket Teams API — Lists. 1 operations. Lead operation: Atlassian List Variables for an Account.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-teams-lists
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Teams API — Lists business capability. Self-contained, no shared references.
    resources:
    - name: teams-username-pipelines_config-variables
      path: /teams/{username}/pipelines_config/variables
      operations:
      - name: listvariablesforanaccount
        method: GET
        description: Atlassian List Variables for an Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The account.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-teams-lists-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Teams API — Lists. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/teams/{username}/pipelines-config/variables
      name: teams-username-pipelines-config-variables
      description: REST surface for teams-username-pipelines_config-variables.
      operations:
      - method: GET
        name: listvariablesforanaccount
        description: Atlassian List Variables for an Account
        call: bitbucket-teams-lists.listvariablesforanaccount
        with:
          username: rest.username
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-teams-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Teams API — Lists. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: atlassian-list-variables-account
      description: Atlassian List Variables for an Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-teams-lists.listvariablesforanaccount
      with:
        username: tools.username
      outputParameters:
      - type: object
        mapping: $.
