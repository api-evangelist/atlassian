naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Connect App Module API — Get
  description: 'Atlassian Confluence Connect App Module API — Get. 1 operations. Lead operation: Atlassian Get Modules. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-connect-app-module-get
    baseUri: ''
    description: Atlassian Confluence Connect App Module API — Get business capability. Self-contained, no shared references.
    resources:
    - name: atlassian-connect-1-app-module-dynamic
      path: /atlassian-connect/1/app/module/dynamic
      operations:
      - name: getmodules
        method: GET
        description: Atlassian Get Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-connect-app-module-get-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Connect App Module API — Get. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/atlassian-connect/1/app/module/dynamic
      name: atlassian-connect-1-app-module-dynamic
      description: REST surface for atlassian-connect-1-app-module-dynamic.
      operations:
      - method: GET
        name: getmodules
        description: Atlassian Get Modules
        call: confluence-connect-app-module-get.getmodules
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-connect-app-module-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Connect App Module API — Get. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-modules
      description: Atlassian Get Modules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-connect-app-module-get.getmodules
      outputParameters:
      - type: object
        mapping: $.
