naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Addon API — Post
  description: 'Atlassian Bit Bucket Addon API — Post. 1 operations. Lead operation: Atlassian Post Addon Linkers Key Values.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Post
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-addon-post
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Addon API — Post business capability. Self-contained, no shared references.
    resources:
    - name: addon-linkers-linker_key-values
      path: /addon/linkers/{linker_key}/values
      operations:
      - name: postaddonlinkerslinkerkeyvalues
        method: POST
        description: Atlassian Post Addon Linkers Key Values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bitbucket-addon-post-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Addon API — Post. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/addon/linkers/{linker-key}/values
      name: addon-linkers-linker-key-values
      description: REST surface for addon-linkers-linker_key-values.
      operations:
      - method: POST
        name: postaddonlinkerslinkerkeyvalues
        description: Atlassian Post Addon Linkers Key Values
        call: bitbucket-addon-post.postaddonlinkerslinkerkeyvalues
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-addon-post-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Addon API — Post. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: atlassian-post-addon-linkers-key
      description: Atlassian Post Addon Linkers Key Values
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-addon-post.postaddonlinkerslinkerkeyvalues
      outputParameters:
      - type: object
        mapping: $.
