naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Effective
  description: 'Atlassian Bit Bucket Repositories API — Effective. 2 operations. Lead operation: Atlassian Get the Effective,
    or Currently Applied, Branching Model for Repository. Self-contained Naftiko capability covering one Atlassian business
    surface.'
  tags:
  - Atlassian
  - Effective
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-effective
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Effective business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-effective-branching-model
      path: /repositories/{workspace}/{repo_slug}/effective-branching-model
      operations:
      - name: gettheeffectiveorcurrentlyappliedbranchingmodelforrepository
        method: GET
        description: Atlassian Get the Effective, or Currently Applied, Branching Model for Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-workspace-repo_slug-effective-default-reviewers
      path: /repositories/{workspace}/{repo_slug}/effective-default-reviewers
      operations:
      - name: listeffectivedefaultreviewers
        method: GET
        description: Atlassian List Effective Default Reviewers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-effective-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Effective. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/effective-branching-model
      name: repositories-workspace-repo-slug-effective-branching-model
      description: REST surface for repositories-workspace-repo_slug-effective-branching-model.
      operations:
      - method: GET
        name: gettheeffectiveorcurrentlyappliedbranchingmodelforrepository
        description: Atlassian Get the Effective, or Currently Applied, Branching Model for Repository
        call: bitbucket-repositories-effective.gettheeffectiveorcurrentlyappliedbranchingmodelforrepository
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/effective-default-reviewers
      name: repositories-workspace-repo-slug-effective-default-reviewers
      description: REST surface for repositories-workspace-repo_slug-effective-default-reviewers.
      operations:
      - method: GET
        name: listeffectivedefaultreviewers
        description: Atlassian List Effective Default Reviewers
        call: bitbucket-repositories-effective.listeffectivedefaultreviewers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-effective-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Effective. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-effective-currently-applied
      description: Atlassian Get the Effective, or Currently Applied, Branching Model for Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-effective.gettheeffectiveorcurrentlyappliedbranchingmodelforrepository
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-list-effective-default-reviewers
      description: Atlassian List Effective Default Reviewers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-effective.listeffectivedefaultreviewers
      outputParameters:
      - type: object
        mapping: $.
