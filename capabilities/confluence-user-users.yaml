naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence User API — Users
  description: 'Atlassian Confluence User API — Users. 6 operations. Lead operation: Atlassian Get Anonymous User. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-user-users
    baseUri: ''
    description: Atlassian Confluence User API — Users business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-user-anonymous
      path: /wiki/rest/api/user/anonymous
      operations:
      - name: atlassiangetanonymoususer
        method: GET
        description: Atlassian Get Anonymous User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: A multi-value parameter indicating which properties of the user to
    - name: wiki-rest-api-user-bulk
      path: /wiki/rest/api/user/bulk
      operations:
      - name: atlassiangetbulkuserlookup
        method: GET
        description: Atlassian Get Multiple Users Using Ids
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
          description: A list of accountId's of users to be returned.
          required: true
        - name: expand
          in: query
          type: array
          description: A multi-value parameter indicating which properties of the user to
        - name: limit
          in: query
          type: integer
          description: The maximum number of results returned.
    - name: wiki-rest-api-user-current
      path: /wiki/rest/api/user/current
      operations:
      - name: atlassiangetcurrentuser
        method: GET
        description: Atlassian Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: A multi-value parameter indicating which properties of the user to
    - name: wiki-rest-api-user-email
      path: /wiki/rest/api/user/email
      operations:
      - name: atlassiangetprivacyunsafeuseremail
        method: GET
        description: Atlassian Get User Email Address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
          description: The account ID of the user, which uniquely identifies the user across all Atlassian products.
          required: true
    - name: wiki-rest-api-user-email-bulk
      path: /wiki/rest/api/user/email/bulk
      operations:
      - name: atlassiangetprivacyunsafeuseremailbulk
        method: GET
        description: Atlassian Get User Email Addresses in Batch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: array
          description: The account IDs of the users.
          required: true
    - name: wiki-rest-api-user-memberof
      path: /wiki/rest/api/user/memberof
      operations:
      - name: atlassiangetgroupmembershipsforuser
        method: GET
        description: Atlassian Get Group Memberships for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
          description: The account ID of the user. The accountId uniquely identifies the user across all Atlassian products.
          required: true
        - name: start
          in: query
          type: integer
          description: The starting index of the returned groups.
        - name: limit
          in: query
          type: integer
          description: The maximum number of groups to return per page.
  exposes:
  - type: rest
    namespace: confluence-user-users-rest
    port: 8080
    description: REST adapter for Atlassian Confluence User API — Users. One Spectral-compliant resource per consumed operation,
