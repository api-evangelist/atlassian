naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Pull Requests API — Users
  description: 'Atlassian Bit Bucket Pull Requests API — Users. 1 operations. Lead operation: Atlassian List Pull Requests
    for User. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-pull-requests-users
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Pull Requests API — Users business capability. Self-contained, no shared references.
    resources:
    - name: pullrequests-selected_user
      path: /pullrequests/{selected_user}
      operations:
      - name: listpullrequestsforuser
        method: GET
        description: Atlassian List Pull Requests for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Only return pull requests that are in this state. This parameter can be repeated.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-pull-requests-users-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Pull Requests API — Users. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/pullrequests/{selected-user}
      name: pullrequests-selected-user
      description: REST surface for pullrequests-selected_user.
      operations:
      - method: GET
        name: listpullrequestsforuser
        description: Atlassian List Pull Requests for User
        call: bitbucket-pull-requests-users.listpullrequestsforuser
        with:
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-pull-requests-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Pull Requests API — Users. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-list-pull-requests-user
      description: Atlassian List Pull Requests for User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-pull-requests-users.listpullrequestsforuser
      with:
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
