naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket User API — Addresses
  description: 'Atlassian Bit Bucket User API — Addresses. 1 operations. Lead operation: Atlassian List Email Addresses for
    Current User. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Addresses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-user-addresses
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket User API — Addresses business capability. Self-contained, no shared references.
    resources:
    - name: user-emails
      path: /user/emails
      operations:
      - name: listemailaddressesforcurrentuser
        method: GET
        description: Atlassian List Email Addresses for Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-user-addresses-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket User API — Addresses. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/user/emails
      name: user-emails
      description: REST surface for user-emails.
      operations:
      - method: GET
        name: listemailaddressesforcurrentuser
        description: Atlassian List Email Addresses for Current User
        call: bitbucket-user-addresses.listemailaddressesforcurrentuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-user-addresses-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket User API — Addresses. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-list-email-addresses-current
      description: Atlassian List Email Addresses for Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-user-addresses.listemailaddressesforcurrentuser
      outputParameters:
      - type: object
        mapping: $.
