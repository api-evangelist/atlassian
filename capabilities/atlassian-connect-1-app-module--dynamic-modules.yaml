naftiko: 1.0.0-alpha2
info:
  label: ' atlassian-connect/1/app/module/ — Dynamic Modules'
  description: ' atlassian-connect/1/app/module/ — Dynamic Modules. 3 operations. Lead operation: Atlassian Get Modules. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Dynamic Modules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: atlassian-connect-1-app-module--dynamic-modules
    baseUri: ''
    description: ' atlassian-connect/1/app/module/ — Dynamic Modules business capability. Self-contained, no shared references.'
    resources:
    - name: atlassian-connect-1-app-module-dynamic
      path: /atlassian-connect/1/app/module/dynamic
      operations:
      - name: atlassiangetmodules
        method: GET
        description: Atlassian Get Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: atlassianregistermodules
        method: POST
        description: Atlassian Register Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: atlassianremovemodules
        method: DELETE
        description: Atlassian Remove Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: moduleKey
          in: query
          type: array
          description: The key of the module to remove. To include multiple module keys, provide multiple copies of this parameter.
          required: true
  exposes:
  - type: rest
    namespace: atlassian-connect-1-app-module--dynamic-modules-rest
    port: 8080
    description: REST adapter for  atlassian-connect/1/app/module/ — Dynamic Modules. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/atlassian-connect/1/app/module/dynamic
      name: atlassian-connect-1-app-module-dynamic
      description: REST surface for atlassian-connect-1-app-module-dynamic.
      operations:
      - method: GET
        name: atlassiangetmodules
        description: Atlassian Get Modules
        call: atlassian-connect-1-app-module--dynamic-modules.atlassiangetmodules
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: atlassianregistermodules
        description: Atlassian Register Modules
        call: atlassian-connect-1-app-module--dynamic-modules.atlassianregistermodules
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: atlassianremovemodules
        description: Atlassian Remove Modules
        call: atlassian-connect-1-app-module--dynamic-modules.atlassianremovemodules
        with:
          moduleKey: rest.moduleKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: atlassian-connect-1-app-module--dynamic-modules-mcp
    port: 9090
    transport: http
    description: MCP adapter for  atlassian-connect/1/app/module/ — Dynamic Modules. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-modules
      description: Atlassian Get Modules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: atlassian-connect-1-app-module--dynamic-modules.atlassiangetmodules
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-register-modules
      description: Atlassian Register Modules
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: atlassian-connect-1-app-module--dynamic-modules.atlassianregistermodules
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-remove-modules
      description: Atlassian Remove Modules
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: atlassian-connect-1-app-module--dynamic-modules.atlassianremovemodules
      with:
        moduleKey: tools.moduleKey
      outputParameters:
      - type: object
        mapping: $.
