naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Milestones
  description: 'Atlassian Bit Bucket Repositories API — Milestones. 2 operations. Lead operation: Atlassian List Milestones.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Milestones
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-milestones
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Milestones business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-milestones
      path: /repositories/{workspace}/{repo_slug}/milestones
      operations:
      - name: listmilestones
        method: GET
        description: Atlassian List Milestones
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-workspace-repo_slug-milestones-milestone_id
      path: /repositories/{workspace}/{repo_slug}/milestones/{milestone_id}
      operations:
      - name: getmilestone
        method: GET
        description: Atlassian Get Milestone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-milestones-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Milestones. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/milestones
      name: repositories-workspace-repo-slug-milestones
      description: REST surface for repositories-workspace-repo_slug-milestones.
      operations:
      - method: GET
        name: listmilestones
        description: Atlassian List Milestones
        call: bitbucket-repositories-milestones.listmilestones
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/milestones/{milestone-id}
      name: repositories-workspace-repo-slug-milestones-milestone-id
      description: REST surface for repositories-workspace-repo_slug-milestones-milestone_id.
      operations:
      - method: GET
        name: getmilestone
        description: Atlassian Get Milestone
        call: bitbucket-repositories-milestones.getmilestone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-milestones-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Milestones. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-list-milestones
      description: Atlassian List Milestones
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-milestones.listmilestones
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-milestone
      description: Atlassian Get Milestone
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-milestones.getmilestone
      outputParameters:
      - type: object
        mapping: $.
