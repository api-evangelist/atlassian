    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Decline. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-decline-pull-request
      description: Atlassian Decline Pull Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-repositories-decline.declinepullrequest
      outputParameters:
      - type: object
        mapping: $.
