naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Decline
  description: 'Atlassian Bit Bucket Repositories API — Decline. 1 operations. Lead operation: Atlassian Decline Pull Request.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Decline
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
