  - type: http
    namespace: bitbucket-repositories-decline
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Decline business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-pullrequests-pull_request_id-decline
      path: /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/decline
      operations:
      - name: declinepullrequest
        method: POST
        description: Atlassian Decline Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
