      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-decline-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Decline. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/pullrequests/{pull-request-id}/decline
      name: repositories-workspace-repo-slug-pullrequests-pull-request-id-decline
      description: REST surface for repositories-workspace-repo_slug-pullrequests-pull_request_id-decline.
      operations:
      - method: POST
        name: declinepullrequest
        description: Atlassian Decline Pull Request
        call: bitbucket-repositories-decline.declinepullrequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
