naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Bulk
  description: 'Atlassian Bit Bucket Repositories API — Bulk. 1 operations. Lead operation: Atlassian Bulk Create or Update
    Annotations. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Bulk
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-bulk
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Bulk business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-commit-commit-reports-reportId-annotations
      path: /repositories/{workspace}/{repo_slug}/commit/{commit}/reports/{reportId}/annotations
      operations:
      - name: bulkcreateorupdateannotations
        method: POST
        description: Atlassian Bulk Create or Update Annotations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: This can either be the workspace ID (slug) or the workspace UUID surrounded by curly-braces, for example
            `{workspace UUID}`.
          required: true
        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
        - name: commit
          in: path
          type: string
          description: The commit for which to retrieve reports.
          required: true
        - name: reportId
          in: path
          type: string
          description: Uuid or external-if of the report for which to get annotations for.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-bulk-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Bulk. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/commit/{commit}/reports/{reportid}/annotations
      name: repositories-workspace-repo-slug-commit-commit-reports-reportid-annotations
      description: REST surface for repositories-workspace-repo_slug-commit-commit-reports-reportId-annotations.
      operations:
      - method: POST
        name: bulkcreateorupdateannotations
        description: Atlassian Bulk Create or Update Annotations
        call: bitbucket-repositories-bulk.bulkcreateorupdateannotations
        with:
          workspace: rest.workspace
          repo_slug: rest.repo_slug
          commit: rest.commit
          reportId: rest.reportId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-bulk-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Bulk. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-bulk-create-update-annotations
      description: Atlassian Bulk Create or Update Annotations
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-repositories-bulk.bulkcreateorupdateannotations
      with:
        workspace: tools.workspace
        repo_slug: tools.repo_slug
        commit: tools.commit
        reportId: tools.reportId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
