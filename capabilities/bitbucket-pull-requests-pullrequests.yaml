    namespace: bitbucket-pull-requests-pullrequests
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Pull Requests API — Pullrequests business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-pullrequests-pull_request_id-tasks-task_id
      path: /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/tasks/{task_id}
      operations:
      - name: updatetaskonpullrequest
        method: PUT
        description: Atlassian Update Task on Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
