    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/pullrequests/{pull-request-id}/tasks/{task-id}
      name: repositories-workspace-repo-slug-pullrequests-pull-request-id-tasks-task-id
      description: REST surface for repositories-workspace-repo_slug-pullrequests-pull_request_id-tasks-task_id.
      operations:
      - method: PUT
        name: updatetaskonpullrequest
        description: Atlassian Update Task on Pull Request
        call: bitbucket-pull-requests-pullrequests.updatetaskonpullrequest
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-pull-requests-pullrequests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Pull Requests API — Pullrequests. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-update-task-pull-request
      description: Atlassian Update Task on Pull Request
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bitbucket-pull-requests-pullrequests.updatetaskonpullrequest
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
