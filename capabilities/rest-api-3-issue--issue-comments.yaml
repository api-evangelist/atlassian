    description: Atlassian rest/api/3/issue/ — Issue Comments business capability. Self-contained, no shared references.
    resources:
    - name: rest-api-3-issue-issueIdOrKey-comment
      path: /rest/api/3/issue/{issueIdOrKey}/comment
      operations:
      - name: atlassiangetcomments
        method: GET
        description: Atlassian Get Comments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: The ID or key of the issue.
          required: true
        - name: startAt
          in: query
          type: integer
          description: The index of the first item to return in a page of results (page offset).
        - name: maxResults
          in: query
          type: integer
          description: The maximum number of items to return per page.
        - name: orderBy
          in: query
          type: string
          description: '[Order](#ordering) the results by a field. Accepts *created* to sort comments by their created date.'
        - name: expand
          in: query
          type: string
          description: Use [expand](#expansion) to include additional information about comments in the response. This parameter
            accepts `renderedBody`, which returns the comment body
      - name: atlassianaddcomment
        method: POST
        description: Atlassian Add Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: The ID or key of the issue.
          required: true
        - name: expand
          in: query
          type: string
          description: Use [expand](#expansion) to include additional information about comments in the response. This parameter
            accepts `renderedBody`, which returns the comment body
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-api-3-issue-issueIdOrKey-comment-id
      path: /rest/api/3/issue/{issueIdOrKey}/comment/{id}
      operations:
      - name: atlassiandeletecomment
        method: DELETE
        description: Atlassian Delete Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: The ID or key of the issue.
          required: true
        - name: id
          in: path
          type: string
          description: The ID of the comment.
          required: true
      - name: atlassiangetcomment
        method: GET
        description: Atlassian Get Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: The ID or key of the issue.
          required: true
        - name: id
          in: path
          type: string
          description: The ID of the comment.
          required: true
        - name: expand
          in: query
          type: string
          description: Use [expand](#expansion) to include additional information about comments in the response. This parameter
            accepts `renderedBody`, which returns the comment body
      - name: atlassianupdatecomment
        method: PUT
        description: Atlassian Update Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: The ID or key of the issue.
          required: true
        - name: id
          in: path
          type: string
          description: The ID of the comment.
          required: true
        - name: notifyUsers
          in: query
          type: boolean
          description: Whether users are notified when a comment is updated.
        - name: overrideEditableFlag
          in: query
          type: boolean
          description: Whether screen security is overridden to enable uneditable fields to be edited. Available to Connect
            app users with the *Administer Jira* [global permission](ht
        - name: expand
          in: query
          type: string
          description: Use [expand](#expansion) to include additional information about comments in the response. This parameter
            accepts `renderedBody`, which returns the comment body
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
