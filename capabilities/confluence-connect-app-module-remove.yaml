naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Connect App Module API — Remove
  description: 'Atlassian Confluence Connect App Module API — Remove. 1 operations. Lead operation: Atlassian Remove Modules.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-connect-app-module-remove
    baseUri: ''
    description: Atlassian Confluence Connect App Module API — Remove business capability. Self-contained, no shared references.
    resources:
    - name: atlassian-connect-1-app-module-dynamic
      path: /atlassian-connect/1/app/module/dynamic
      operations:
      - name: removemodules
        method: DELETE
        description: Atlassian Remove Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: moduleKey
          in: query
          type: array
          description: The key of the module to remove. To include multiple module keys, provide multiple copies of this parameter.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-connect-app-module-remove-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Connect App Module API — Remove. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/atlassian-connect/1/app/module/dynamic
      name: atlassian-connect-1-app-module-dynamic
      description: REST surface for atlassian-connect-1-app-module-dynamic.
      operations:
      - method: DELETE
        name: removemodules
        description: Atlassian Remove Modules
        call: confluence-connect-app-module-remove.removemodules
        with:
          moduleKey: rest.moduleKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-connect-app-module-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Connect App Module API — Remove. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-remove-modules
      description: Atlassian Remove Modules
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: confluence-connect-app-module-remove.removemodules
      with:
        moduleKey: tools.moduleKey
      outputParameters:
      - type: object
        mapping: $.
