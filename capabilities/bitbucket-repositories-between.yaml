naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Between
  description: 'Atlassian Bit Bucket Repositories API — Between. 1 operations. Lead operation: Atlassian Get the Common Ancestor
    Between Two Commits. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Between
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-between
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Between business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-merge-base-revspec
      path: /repositories/{workspace}/{repo_slug}/merge-base/{revspec}
      operations:
      - name: getthecommonancestorbetweentwocommits
        method: GET
        description: Atlassian Get the Common Ancestor Between Two Commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-between-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Between. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/merge-base/{revspec}
      name: repositories-workspace-repo-slug-merge-base-revspec
      description: REST surface for repositories-workspace-repo_slug-merge-base-revspec.
      operations:
      - method: GET
        name: getthecommonancestorbetweentwocommits
        description: Atlassian Get the Common Ancestor Between Two Commits
        call: bitbucket-repositories-between.getthecommonancestorbetweentwocommits
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-between-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Between. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-common-ancestor-between
      description: Atlassian Get the Common Ancestor Between Two Commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-between.getthecommonancestorbetweentwocommits
      outputParameters:
      - type: object
        mapping: $.
