naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Runs
  description: 'Atlassian Bit Bucket Repositories API — Runs. 1 operations. Lead operation: Atlassian Run Pipeline. Self-contained
    Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Runs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-runs
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Runs business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-pipelines
      path: /repositories/{workspace}/{repo_slug}/pipelines
      operations:
      - name: runpipeline
        method: POST
        description: Atlassian Run Pipeline
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: This can either be the workspace ID (slug) or the workspace UUID surrounded by curly-braces, for example
            `{workspace UUID}`.
          required: true
        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-runs-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Runs. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/pipelines
      name: repositories-workspace-repo-slug-pipelines
      description: REST surface for repositories-workspace-repo_slug-pipelines.
      operations:
      - method: POST
        name: runpipeline
        description: Atlassian Run Pipeline
        call: bitbucket-repositories-runs.runpipeline
        with:
          workspace: rest.workspace
          repo_slug: rest.repo_slug
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-runs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Runs. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-run-pipeline
      description: Atlassian Run Pipeline
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-repositories-runs.runpipeline
      with:
        workspace: tools.workspace
        repo_slug: tools.repo_slug
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
