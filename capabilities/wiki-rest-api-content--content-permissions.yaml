naftiko: 1.0.0-alpha2
info:
  label: Atlassian wiki/rest/api/content/ — Content Permissions
  description: 'Atlassian wiki/rest/api/content/ — Content Permissions. 1 operations. Lead operation: Atlassian Check Content
    Permissions. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Content Permissions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: wiki-rest-api-content--content-permissions
    baseUri: ''
    description: Atlassian wiki/rest/api/content/ — Content Permissions business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-permission-check
      path: /wiki/rest/api/content/{id}/permission/check
      operations:
      - name: atlassiancheckcontentpermission
        method: POST
        description: Atlassian Check Content Permissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the content to check permissions against.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: wiki-rest-api-content--content-permissions-rest
    port: 8080
    description: REST adapter for Atlassian wiki/rest/api/content/ — Content Permissions. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/permission/check
      name: wiki-rest-api-content-id-permission-check
      description: REST surface for wiki-rest-api-content-id-permission-check.
      operations:
      - method: POST
        name: atlassiancheckcontentpermission
        description: Atlassian Check Content Permissions
        call: wiki-rest-api-content--content-permissions.atlassiancheckcontentpermission
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wiki-rest-api-content--content-permissions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian wiki/rest/api/content/ — Content Permissions. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: atlassian-check-content-permissions
      description: Atlassian Check Content Permissions
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: wiki-rest-api-content--content-permissions.atlassiancheckcontentpermission
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
