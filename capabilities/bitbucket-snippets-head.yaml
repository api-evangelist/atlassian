    description: Atlassian Bit Bucket Snippets API — Head business capability. Self-contained, no shared references.
    resources:
    - name: snippets-workspace-encoded_id-files-path
      path: /snippets/{workspace}/{encoded_id}/files/{path}
      operations:
      - name: getsnippetsrawfileathead
        method: GET
        description: Atlassian Get Snippets Raw File at Head
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
