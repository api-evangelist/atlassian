    Head. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Head
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
