naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Patch
  description: 'Atlassian Bit Bucket Repositories API — Patch. 2 operations. Lead operation: Atlassian Get Patch for Two Commits.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Patch
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-patch
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Patch business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-patch-spec
      path: /repositories/{workspace}/{repo_slug}/patch/{spec}
      operations:
      - name: getpatchfortwocommits
        method: GET
        description: Atlassian Get Patch for Two Commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-workspace-repo_slug-pullrequests-pull_request_id-patch
      path: /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/patch
      operations:
      - name: getthepatchforpullrequest
        method: GET
        description: Atlassian Get the Patch for Pull Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-patch-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Patch. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/patch/{spec}
      name: repositories-workspace-repo-slug-patch-spec
      description: REST surface for repositories-workspace-repo_slug-patch-spec.
      operations:
      - method: GET
        name: getpatchfortwocommits
        description: Atlassian Get Patch for Two Commits
        call: bitbucket-repositories-patch.getpatchfortwocommits
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{workspace}/{repo-slug}/pullrequests/{pull-request-id}/patch
      name: repositories-workspace-repo-slug-pullrequests-pull-request-id-patch
      description: REST surface for repositories-workspace-repo_slug-pullrequests-pull_request_id-patch.
      operations:
      - method: GET
        name: getthepatchforpullrequest
        description: Atlassian Get the Patch for Pull Request
        call: bitbucket-repositories-patch.getthepatchforpullrequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-patch-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Patch. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-get-patch-two-commits
      description: Atlassian Get Patch for Two Commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-patch.getpatchfortwocommits
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-patch-pull-request
      description: Atlassian Get the Patch for Pull Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-patch.getthepatchforpullrequest
      outputParameters:
      - type: object
        mapping: $.
