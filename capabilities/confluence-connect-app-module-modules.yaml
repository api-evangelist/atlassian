naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Connect App Module API — Modules
  description: 'Atlassian Confluence Connect App Module API — Modules. 3 operations. Lead operation: Atlassian Get Modules.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Modules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-connect-app-module-modules
    baseUri: ''
    description: Atlassian Confluence Connect App Module API — Modules business capability. Self-contained, no shared references.
    resources:
    - name: atlassian-connect-1-app-module-dynamic
      path: /atlassian-connect/1/app/module/dynamic
      operations:
      - name: getmodules
        method: GET
        description: Atlassian Get Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: registermodules
        method: POST
        description: Atlassian Register Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removemodules
        method: DELETE
        description: Atlassian Remove Modules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: moduleKey
          in: query
          type: array
          description: The key of the module to remove. To include multiple module keys, provide multiple copies of this parameter.
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-connect-app-module-modules-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Connect App Module API — Modules. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/atlassian-connect/1/app/module/dynamic
      name: atlassian-connect-1-app-module-dynamic
      description: REST surface for atlassian-connect-1-app-module-dynamic.
      operations:
      - method: GET
        name: getmodules
        description: Atlassian Get Modules
        call: confluence-connect-app-module-modules.getmodules
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: registermodules
        description: Atlassian Register Modules
        call: confluence-connect-app-module-modules.registermodules
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removemodules
        description: Atlassian Remove Modules
        call: confluence-connect-app-module-modules.removemodules
        with:
          moduleKey: rest.moduleKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-connect-app-module-modules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Connect App Module API — Modules. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-modules
      description: Atlassian Get Modules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-connect-app-module-modules.getmodules
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-register-modules
      description: Atlassian Register Modules
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: confluence-connect-app-module-modules.registermodules
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-remove-modules
      description: Atlassian Remove Modules
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: confluence-connect-app-module-modules.removemodules
      with:
        moduleKey: tools.moduleKey
      outputParameters:
      - type: object
        mapping: $.
