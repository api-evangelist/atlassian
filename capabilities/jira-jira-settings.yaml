naftiko: 1.0.0-alpha2
info:
  label: Atlassian The Jira Cloud platform REST API — Jira Settings
  description: 'Atlassian The Jira Cloud platform REST API — Jira Settings. 4 operations. Lead operation: Atlassian Get Application
    Property. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Jira Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: jira-jira-settings
    baseUri: https://your-domain.atlassian.net
    description: Atlassian The Jira Cloud platform REST API — Jira Settings business capability. Self-contained, no shared
      references.
    resources:
    - name: rest-api-3-application-properties
      path: /rest/api/3/application-properties
      operations:
      - name: atlassiangetapplicationproperty
        method: GET
        description: Atlassian Get Application Property
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: query
          type: string
          description: The key of the application property.
        - name: permissionLevel
          in: query
          type: string
          description: The permission level of all items being returned in the list.
        - name: keyFilter
          in: query
          type: string
          description: 'When a `key` isn''t provided, this filters the list of results by the application property `key` using
            a regular expression. For example, using `jira.lf.*` will '
    - name: rest-api-3-application-properties-advanced-settings
      path: /rest/api/3/application-properties/advanced-settings
      operations:
      - name: atlassiangetadvancedsettings
        method: GET
        description: Atlassian Get Advanced Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rest-api-3-application-properties-id
      path: /rest/api/3/application-properties/{id}
      operations:
      - name: atlassiansetapplicationproperty
        method: PUT
        description: Atlassian Set Application Property
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The key of the application property to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-api-3-configuration
      path: /rest/api/3/configuration
      operations:
      - name: atlassiangetconfiguration
        method: GET
        description: Atlassian Get Global Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: jira-jira-settings-rest
    port: 8080
    description: REST adapter for Atlassian The Jira Cloud platform REST API — Jira Settings. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/3/application-properties
      name: rest-api-3-application-properties
      description: REST surface for rest-api-3-application-properties.
      operations:
      - method: GET
        name: atlassiangetapplicationproperty
        description: Atlassian Get Application Property
        call: jira-jira-settings.atlassiangetapplicationproperty
        with:
          key: rest.key
          permissionLevel: rest.permissionLevel
          keyFilter: rest.keyFilter
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/3/application-properties/advanced-settings
      name: rest-api-3-application-properties-advanced-settings
      description: REST surface for rest-api-3-application-properties-advanced-settings.
      operations:
      - method: GET
        name: atlassiangetadvancedsettings
        description: Atlassian Get Advanced Settings
        call: jira-jira-settings.atlassiangetadvancedsettings
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/3/application-properties/{id}
      name: rest-api-3-application-properties-id
      description: REST surface for rest-api-3-application-properties-id.
      operations:
      - method: PUT
        name: atlassiansetapplicationproperty
        description: Atlassian Set Application Property
        call: jira-jira-settings.atlassiansetapplicationproperty
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/3/configuration
      name: rest-api-3-configuration
      description: REST surface for rest-api-3-configuration.
      operations:
      - method: GET
        name: atlassiangetconfiguration
        description: Atlassian Get Global Settings
        call: jira-jira-settings.atlassiangetconfiguration
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: jira-jira-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian The Jira Cloud platform REST API — Jira Settings. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: atlassian-get-application-property
      description: Atlassian Get Application Property
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jira-jira-settings.atlassiangetapplicationproperty
      with:
        key: tools.key
        permissionLevel: tools.permissionLevel
        keyFilter: tools.keyFilter
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-advanced-settings
      description: Atlassian Get Advanced Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jira-jira-settings.atlassiangetadvancedsettings
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-set-application-property
      description: Atlassian Set Application Property
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: jira-jira-settings.atlassiansetapplicationproperty
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-global-settings
      description: Atlassian Get Global Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jira-jira-settings.atlassiangetconfiguration
      outputParameters:
      - type: object
        mapping: $.
