naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Voted
  description: 'Atlassian Bit Bucket Repositories API — Voted. 1 operations. Lead operation: Atlassian Check if Current User
    Voted for an Issue. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Voted
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-voted
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Voted business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-issues-issue_id-vote
      path: /repositories/{workspace}/{repo_slug}/issues/{issue_id}/vote
      operations:
      - name: checkifcurrentuservotedforanissue
        method: GET
        description: Atlassian Check if Current User Voted for an Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-voted-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Voted. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/issues/{issue-id}/vote
      name: repositories-workspace-repo-slug-issues-issue-id-vote
      description: REST surface for repositories-workspace-repo_slug-issues-issue_id-vote.
      operations:
      - method: GET
        name: checkifcurrentuservotedforanissue
        description: Atlassian Check if Current User Voted for an Issue
        call: bitbucket-repositories-voted.checkifcurrentuservotedforanissue
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-voted-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Voted. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-check-if-current-user
      description: Atlassian Check if Current User Voted for an Issue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-voted.checkifcurrentuservotedforanissue
      outputParameters:
      - type: object
        mapping: $.
