naftiko: 1.0.0-alpha2
info:
  label: Atlassian Confluence Content API — Spaces
  description: 'Atlassian Confluence Content API — Spaces. 1 operations. Lead operation: Atlassian Get Watches for Space.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Spaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: confluence-content-spaces
    baseUri: ''
    description: Atlassian Confluence Content API — Spaces business capability. Self-contained, no shared references.
    resources:
    - name: wiki-rest-api-content-id-notification-created
      path: /wiki/rest/api/content/{id}/notification/created
      operations:
      - name: getwatchesforspace
        method: GET
        description: Atlassian Get Watches for Space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the content to be queried for its watches.
          required: true
        - name: start
          in: query
          type: integer
          description: The starting index of the returned watches.
        - name: limit
          in: query
          type: integer
          description: The maximum number of watches to return per page.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: confluence-content-spaces-rest
    port: 8080
    description: REST adapter for Atlassian Confluence Content API — Spaces. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wiki/rest/api/content/{id}/notification/created
      name: wiki-rest-api-content-id-notification-created
      description: REST surface for wiki-rest-api-content-id-notification-created.
      operations:
      - method: GET
        name: getwatchesforspace
        description: Atlassian Get Watches for Space
        call: confluence-content-spaces.getwatchesforspace
        with:
          id: rest.id
          start: rest.start
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: confluence-content-spaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Confluence Content API — Spaces. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-get-watches-space
      description: Atlassian Get Watches for Space
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: confluence-content-spaces.getwatchesforspace
      with:
        id: tools.id
        start: tools.start
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
