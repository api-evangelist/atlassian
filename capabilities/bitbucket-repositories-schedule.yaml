naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Schedule
  description: 'Atlassian Bit Bucket Repositories API — Schedule. 1 operations. Lead operation: Atlassian Create Schedule.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Schedule
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-schedule
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Schedule business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-pipelines_config-schedules
      path: /repositories/{workspace}/{repo_slug}/pipelines_config/schedules
      operations:
      - name: createschedule
        method: POST
        description: Atlassian Create Schedule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: This can either be the workspace ID (slug) or the workspace UUID surrounded by curly-braces, for example
            `{workspace UUID}`.
          required: true
        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-schedule-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Schedule. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/pipelines-config/schedules
      name: repositories-workspace-repo-slug-pipelines-config-schedules
      description: REST surface for repositories-workspace-repo_slug-pipelines_config-schedules.
      operations:
      - method: POST
        name: createschedule
        description: Atlassian Create Schedule
        call: bitbucket-repositories-schedule.createschedule
        with:
          workspace: rest.workspace
          repo_slug: rest.repo_slug
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-schedule-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Schedule. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-create-schedule
      description: Atlassian Create Schedule
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bitbucket-repositories-schedule.createschedule
      with:
        workspace: tools.workspace
        repo_slug: tools.repo_slug
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
