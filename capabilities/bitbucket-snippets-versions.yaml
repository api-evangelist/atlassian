naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Snippets API — Versions
  description: 'Atlassian Bit Bucket Snippets API — Versions. 2 operations. Lead operation: Atlassian Get Snippet Changes
    Between Versions. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Versions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-snippets-versions
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Snippets API — Versions business capability. Self-contained, no shared references.
    resources:
    - name: snippets-workspace-encoded_id-revision-diff
      path: /snippets/{workspace}/{encoded_id}/{revision}/diff
      operations:
      - name: getsnippetchangesbetweenversions
        method: GET
        description: Atlassian Get Snippet Changes Between Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: query
          type: string
          description: When used, only one the diff of the specified file will be returned.
    - name: snippets-workspace-encoded_id-revision-patch
      path: /snippets/{workspace}/{encoded_id}/{revision}/patch
      operations:
      - name: getsnippetpatchbetweenversions
        method: GET
        description: Atlassian Get Snippet Patch Between Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bitbucket-snippets-versions-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Snippets API — Versions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/snippets/{workspace}/{encoded-id}/{revision}/diff
      name: snippets-workspace-encoded-id-revision-diff
      description: REST surface for snippets-workspace-encoded_id-revision-diff.
      operations:
      - method: GET
        name: getsnippetchangesbetweenversions
        description: Atlassian Get Snippet Changes Between Versions
        call: bitbucket-snippets-versions.getsnippetchangesbetweenversions
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/snippets/{workspace}/{encoded-id}/{revision}/patch
      name: snippets-workspace-encoded-id-revision-patch
      description: REST surface for snippets-workspace-encoded_id-revision-patch.
      operations:
      - method: GET
        name: getsnippetpatchbetweenversions
        description: Atlassian Get Snippet Patch Between Versions
        call: bitbucket-snippets-versions.getsnippetpatchbetweenversions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-snippets-versions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Snippets API — Versions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-get-snippet-changes-between
      description: Atlassian Get Snippet Changes Between Versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-snippets-versions.getsnippetchangesbetweenversions
      with:
        path: tools.path
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-get-snippet-patch-between
      description: Atlassian Get Snippet Patch Between Versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-snippets-versions.getsnippetpatchbetweenversions
      outputParameters:
      - type: object
        mapping: $.
