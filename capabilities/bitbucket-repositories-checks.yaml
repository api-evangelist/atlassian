naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Checks
  description: 'Atlassian Bit Bucket Repositories API — Checks. 4 operations. Lead operation: Atlassian Check Issue Export
    Status. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Checks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
