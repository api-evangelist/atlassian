      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-checks.checkifcurrentuservotedforanissue
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-check-if-current-user-2
      description: Atlassian Check if Current User Is Watching Issue
      hints:
