naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Configuration
  description: 'Atlassian Bit Bucket Repositories API — Configuration. 2 operations. Lead operation: Atlassian Get Configuration.
    Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-configuration
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-pipelines_config
      path: /repositories/{workspace}/{repo_slug}/pipelines_config
      operations:
      - name: getconfiguration
        method: GET
        description: Atlassian Get Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: The account.
          required: true
        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
      - name: updateconfiguration
        method: PUT
        description: Atlassian Update Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: This can either be the workspace ID (slug) or the workspace UUID surrounded by curly-braces, for example
            `{workspace UUID}`.
          required: true
        - name: repo_slug
          in: path
          type: string
          description: The repository.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-configuration-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Configuration. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/pipelines-config
      name: repositories-workspace-repo-slug-pipelines-config
      description: REST surface for repositories-workspace-repo_slug-pipelines_config.
      operations:
      - method: GET
        name: getconfiguration
        description: Atlassian Get Configuration
        call: bitbucket-repositories-configuration.getconfiguration
        with:
          workspace: rest.workspace
          repo_slug: rest.repo_slug
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateconfiguration
        description: Atlassian Update Configuration
        call: bitbucket-repositories-configuration.updateconfiguration
        with:
          workspace: rest.workspace
          repo_slug: rest.repo_slug
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Configuration. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-get-configuration
      description: Atlassian Get Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-configuration.getconfiguration
      with:
        workspace: tools.workspace
        repo_slug: tools.repo_slug
      outputParameters:
      - type: object
        mapping: $.
    - name: atlassian-update-configuration
      description: Atlassian Update Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bitbucket-repositories-configuration.updateconfiguration
      with:
        workspace: tools.workspace
        repo_slug: tools.repo_slug
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
