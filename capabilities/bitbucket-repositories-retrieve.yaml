naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket Repositories API — Retrieve
  description: 'Atlassian Bit Bucket Repositories API — Retrieve. 1 operations. Lead operation: Atlassian Retrieve the Inheritance
    State for Repository Settings. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Retrieve
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-repositories-retrieve
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket Repositories API — Retrieve business capability. Self-contained, no shared references.
    resources:
    - name: repositories-workspace-repo_slug-override-settings
      path: /repositories/{workspace}/{repo_slug}/override-settings
      operations:
      - name: retrievetheinheritancestateforrepositorysettings
        method: GET
        description: Atlassian Retrieve the Inheritance State for Repository Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-repositories-retrieve-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket Repositories API — Retrieve. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/repositories/{workspace}/{repo-slug}/override-settings
      name: repositories-workspace-repo-slug-override-settings
      description: REST surface for repositories-workspace-repo_slug-override-settings.
      operations:
      - method: GET
        name: retrievetheinheritancestateforrepositorysettings
        description: Atlassian Retrieve the Inheritance State for Repository Settings
        call: bitbucket-repositories-retrieve.retrievetheinheritancestateforrepositorysettings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bitbucket-repositories-retrieve-mcp
    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket Repositories API — Retrieve. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: atlassian-retrieve-inheritance-state-repository
      description: Atlassian Retrieve the Inheritance State for Repository Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-repositories-retrieve.retrievetheinheritancestateforrepositorysettings
      outputParameters:
      - type: object
        mapping: $.
