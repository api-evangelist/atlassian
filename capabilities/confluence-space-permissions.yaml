        description: Atlassian Add New Permission To Space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: spaceKey
          in: path
          type: string
          description: The key of the space to be queried for its content.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
