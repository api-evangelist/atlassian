naftiko: 1.0.0-alpha2
info:
  label: Atlassian The Jira Cloud platform REST API — Project Components
  description: 'Atlassian The Jira Cloud platform REST API — Project Components. 8 operations. Lead operation: Atlassian Find
    Components For Projects. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Project Components
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: jira-project-components
    baseUri: https://your-domain.atlassian.net
    description: Atlassian The Jira Cloud platform REST API — Project Components business capability. Self-contained, no shared
      references.
    resources:
    - name: rest-api-3-component
      path: /rest/api/3/component
      operations:
      - name: atlassianfindcomponentsforprojects
        method: GET
        description: Atlassian Find Components For Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectIdsOrKeys
          in: query
          type: array
          description: The project IDs and/or project keys (case sensitive).
          required: true
        - name: startAt
          in: query
          type: integer
          description: The index of the first item to return in a page of results (page offset).
        - name: maxResults
          in: query
          type: integer
          description: The maximum number of items to return per page.
        - name: orderBy
          in: query
          type: string
          description: '[Order](#ordering) the results by a field:'
        - name: query
          in: query
          type: string
          description: Filter the results using a literal string. Components with a matching `name` or `description` are returned
            (case insensitive).
      - name: atlassiancreatecomponent
        method: POST
        description: Atlassian Create Component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-api-3-component-id
      path: /rest/api/3/component/{id}
      operations:
      - name: atlassiandeletecomponent
        method: DELETE
        description: Atlassian Delete Component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the component.
          required: true
        - name: moveIssuesTo
          in: query
          type: string
          description: The ID of the component to replace the deleted component. If this value is null no replacement is made.
      - name: atlassiangetcomponent
        method: GET
        description: Atlassian Get Component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the component.
          required: true
      - name: atlassianupdatecomponent
        method: PUT
        description: Atlassian Update Component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the component.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-api-3-component-id-relatedIssueCounts
      path: /rest/api/3/component/{id}/relatedIssueCounts
      operations:
      - name: atlassiangetcomponentrelatedissues
        method: GET
        description: Atlassian Get Component Issues Count
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the component.
          required: true
    - name: rest-api-3-project-projectIdOrKey-component
      path: /rest/api/3/project/{projectIdOrKey}/component
      operations:
      - name: atlassiangetprojectcomponentspaginated
        method: GET
        description: Atlassian Get Project Components Paginated
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectIdOrKey
          in: path
          type: string
          description: The project ID or project key (case sensitive).
          required: true
        - name: startAt
          in: query
          type: integer
          description: The index of the first item to return in a page of results (page offset).
        - name: maxResults
          in: query
          type: integer
          description: The maximum number of items to return per page.
        - name: orderBy
          in: query
          type: string
          description: '[Order](#ordering) the results by a field:'
        - name: componentSource
          in: query
          type: string
          description: The source of the components to return. Can be `jira` (default), `compass` or `auto`. When `auto` is
            specified, the API will return connected Compass components
        - name: query
          in: query
          type: string
          description: Filter the results using a literal string. Components with a matching `name` or `description` are returned
            (case insensitive).
    - name: rest-api-3-project-projectIdOrKey-components
      path: /rest/api/3/project/{projectIdOrKey}/components
      operations:
      - name: atlassiangetprojectcomponents
        method: GET
        description: Atlassian Get Project Components
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectIdOrKey
          in: path
          type: string
          description: The project ID or project key (case sensitive).
          required: true
        - name: componentSource
          in: query
          type: string
          description: The source of the components to return. Can be `jira` (default), `compass` or `auto`. When `auto` is
            specified, the API will return connected Compass components
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
