naftiko: 1.0.0-alpha2
info:
  label: Atlassian Bit Bucket User API — Workspaces
  description: 'Atlassian Bit Bucket User API — Workspaces. 1 operations. Lead operation: Atlassian List Workspaces for the
    Current User. Self-contained Naftiko capability covering one Atlassian business surface.'
  tags:
  - Atlassian
  - Workspaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ATLASSIAN_API_KEY: ATLASSIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: bitbucket-user-workspaces
    baseUri: https://api.bitbucket.org/2.0
    description: Atlassian Bit Bucket User API — Workspaces business capability. Self-contained, no shared references.
    resources:
    - name: user-permissions-workspaces
      path: /user/permissions/workspaces
      operations:
      - name: listworkspacesforthecurrentuser
        method: GET
        description: Atlassian List Workspaces for the Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Query string to narrow down the response. See
        - name: sort
          in: query
          type: string
          description: Name of a response property to sort results. See
    authentication:
      type: bearer
      token: '{{env.ATLASSIAN_API_KEY}}'
  exposes:
  - type: rest
    namespace: bitbucket-user-workspaces-rest
    port: 8080
    description: REST adapter for Atlassian Bit Bucket User API — Workspaces. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/user/permissions/workspaces
      name: user-permissions-workspaces
      description: REST surface for user-permissions-workspaces.
      operations:
      - method: GET
        name: listworkspacesforthecurrentuser
        description: Atlassian List Workspaces for the Current User
        call: bitbucket-user-workspaces.listworkspacesforthecurrentuser
        with:
          q: rest.q
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
