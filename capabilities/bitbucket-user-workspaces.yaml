    port: 9090
    transport: http
    description: MCP adapter for Atlassian Bit Bucket User API — Workspaces. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: atlassian-list-workspaces-current-user
      description: Atlassian List Workspaces for the Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bitbucket-user-workspaces.listworkspacesforthecurrentuser
      with:
        q: tools.q
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
